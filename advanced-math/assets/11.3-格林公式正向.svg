<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 320" font-family="sans-serif">
  <defs>
    <marker id="ar-b" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#46c"/></marker>
    <marker id="ar-r" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#e77"/></marker>
  </defs>
  <!-- 外边界:一个圆角不规则区域,逆时针 -->
  <path d="M120,90 Q230,40 350,90 Q400,160 350,240 Q230,290 120,240 Q70,160 120,90 Z"
        fill="#eef4ff" stroke="#46c" stroke-width="2.5"/>
  <!-- 内边界:洞,顺时针 -->
  <path d="M210,150 Q250,130 290,150 Q300,180 280,200 Q240,215 210,195 Q200,170 210,150 Z"
        fill="#fff" stroke="#e77" stroke-width="2.5"/>
  <!-- 外边界方向箭头(逆时针:底部向右) -->
  <line x1="220" y1="278" x2="270" y2="278" stroke="#46c" stroke-width="2.5" marker-end="url(#ar-b)"/>
  <line x1="360" y1="150" x2="360" y2="120" stroke="#46c" stroke-width="2.5" marker-end="url(#ar-b)"/>
  <!-- 内边界方向箭头(顺时针) -->
  <line x1="270" y1="142" x2="230" y2="142" stroke="#e77" stroke-width="2" marker-end="url(#ar-r)"/>
  <!-- 标注 -->
  <text x="150" y="170" font-size="20" fill="#46c" font-weight="bold">D</text>
  <text x="375" y="110" font-size="14" fill="#46c">L 外:逆时针</text>
  <text x="180" y="125" font-size="13" fill="#e77">l 内:顺时针</text>
  <text x="245" y="178" font-size="13" fill="#888">洞</text>
  <text x="60" y="305" font-size="12" fill="#888">正向 = 人沿边界走时,区域 D 始终在左手边</text>
</svg>
