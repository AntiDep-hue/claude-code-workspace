<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 300" font-family="sans-serif">
  <!-- 本图演算框 -->
  <rect x="8" y="6" width="454" height="40" rx="5" fill="#f3f6fb" stroke="#cdd8ea"/>
  <text x="18" y="23" font-size="12" fill="#445">本图演算　例1 周期4方波：f=0 (−2≤x&lt;0), f=h (0≤x&lt;2)</text>
  <text x="18" y="38" font-size="12" fill="#445">间断点 x=0,±2 处级数收敛到 (0+h)/2 = h/2</text>

  <!-- 坐标轴 原点(235,200), x单位: 2->50px -->
  <line x1="40" y1="200" x2="440" y2="200" stroke="#444" stroke-width="1.3"/>
  <line x1="235" y1="270" x2="235" y2="80" stroke="#444" stroke-width="1.3"/>
  <text x="430" y="218" font-size="11" fill="#888">x</text>
  <text x="244" y="118" font-size="10" fill="#888">h</text>
  <text x="240" y="165" font-size="10" fill="#46c">h/2</text>

  <!-- 方波: 周期内 高h段 与 0段, 画 [-4,4] 即 3周期 -->
  <!-- 高 h = y 120 -->
  <g stroke="#e77" stroke-width="3" fill="none">
    <line x1="135" y1="120" x2="185" y2="120"/>
    <line x1="185" y1="200" x2="235" y2="200"/>
    <line x1="235" y1="120" x2="285" y2="120"/>
    <line x1="285" y1="200" x2="335" y2="200"/>
    <line x1="335" y1="120" x2="385" y2="120"/>
  </g>
  <!-- 跳变虚线 -->
  <g stroke="#e77" stroke-width="1.2" stroke-dasharray="4 3">
    <line x1="185" y1="120" x2="185" y2="200"/>
    <line x1="235" y1="120" x2="235" y2="200"/>
    <line x1="285" y1="120" x2="285" y2="200"/>
    <line x1="335" y1="120" x2="335" y2="200"/>
  </g>
  <text x="155" y="115" font-size="10" fill="#e77">h</text>
  <text x="255" y="115" font-size="10" fill="#e77">h</text>
  <text x="350" y="115" font-size="10" fill="#e77">0段</text>

  <!-- x刻度 -->
  <text x="180" y="218" font-size="10" fill="#888">0</text>
  <text x="280" y="218" font-size="10" fill="#888">2</text>
  <text x="328" y="218" font-size="10" fill="#888">4</text>
  <text x="128" y="218" font-size="10" fill="#888">−2</text>

  <!-- 收敛中点 (实心) at x=0(235), x=2(285)... y=160 -->
  <circle cx="235" cy="160" r="5" fill="#46c"/>
  <circle cx="285" cy="160" r="5" fill="#46c"/>
  <circle cx="185" cy="160" r="5" fill="#46c"/>
  <circle cx="335" cy="160" r="5" fill="#46c"/>
  <text x="295" y="156" font-size="11.5" fill="#46c" font-weight="bold">级数值 h/2</text>

  <text x="40" y="290" font-size="11" fill="#888">和函数 = 方波(连续点) + 各跳变正中的 h/2(实心点)</text>
</svg>
