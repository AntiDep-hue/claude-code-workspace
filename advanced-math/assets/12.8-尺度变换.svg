<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 300" font-family="sans-serif">
  <defs>
    <marker id="t8a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#444"/></marker>
  </defs>
  <!-- 本图演算框 -->
  <rect x="8" y="6" width="454" height="40" rx="5" fill="#f3f6fb" stroke="#cdd8ea"/>
  <text x="18" y="23" font-size="12" fill="#445">本图演算　z = πx/l ：把周期 2l 压成周期 2π</text>
  <text x="18" y="38" font-size="12" fill="#445">套用 12.7 现成结论，再代回 x，所有 2l 公式都由此而来</text>

  <!-- 上轴: x 区间 [-l, l] -->
  <text x="20" y="85" font-size="12.5" fill="#445" font-weight="bold">x 轴</text>
  <line x1="70" y1="100" x2="420" y2="100" stroke="#444" stroke-width="1.4" marker-end="url(#t8a)"/>
  <line x1="120" y1="92" x2="120" y2="108" stroke="#e77" stroke-width="2.5"/>
  <line x1="370" y1="92" x2="370" y2="108" stroke="#e77" stroke-width="2.5"/>
  <line x1="245" y1="94" x2="245" y2="106" stroke="#888" stroke-width="1.3"/>
  <text x="112" y="128" font-size="12" fill="#e77" font-weight="bold">−l</text>
  <text x="365" y="128" font-size="12" fill="#e77" font-weight="bold">l</text>
  <text x="242" y="128" font-size="11" fill="#888">0</text>
  <text x="180" y="88" font-size="11" fill="#666">周期 2l</text>

  <!-- 映射箭头 -->
  <line x1="245" y1="140" x2="245" y2="180" stroke="#46c" stroke-width="2" marker-end="url(#t8a)"/>
  <text x="255" y="165" font-size="12.5" fill="#46c" font-weight="bold">z = πx/l</text>

  <!-- 下轴: z 区间 [-π, π] -->
  <text x="20" y="220" font-size="12.5" fill="#445" font-weight="bold">z 轴</text>
  <line x1="70" y1="235" x2="420" y2="235" stroke="#444" stroke-width="1.4" marker-end="url(#t8a)"/>
  <line x1="120" y1="227" x2="120" y2="243" stroke="#2b7" stroke-width="2.5"/>
  <line x1="370" y1="227" x2="370" y2="243" stroke="#2b7" stroke-width="2.5"/>
  <line x1="245" y1="229" x2="245" y2="241" stroke="#888" stroke-width="1.3"/>
  <text x="110" y="263" font-size="12" fill="#2b7" font-weight="bold">−π</text>
  <text x="365" y="263" font-size="12" fill="#2b7" font-weight="bold">π</text>
  <text x="242" y="263" font-size="11" fill="#888">0</text>
  <text x="178" y="223" font-size="11" fill="#666">周期 2π（12.7 已会）</text>

  <!-- 端点对应虚线 -->
  <line x1="120" y1="110" x2="120" y2="225" stroke="#bbb" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="370" y1="110" x2="370" y2="225" stroke="#bbb" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="290" y="289" font-size="11" fill="#888">x=l ↔ z=π　令 l=π 就退回上一节</text>
</svg>
