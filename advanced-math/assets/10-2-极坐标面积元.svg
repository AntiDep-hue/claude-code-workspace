<svg viewBox="0 0 420 320" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="qd" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#444"/></marker>
  </defs>

  <rect x="8" y="6" width="404" height="44" rx="5" fill="#fbf4f4" stroke="#dcc"/>
  <text x="18" y="25" font-size="12.5" fill="#333" font-weight="bold">本图演算：极坐标面积元 dσ = ρ dρ dθ（不是 dρ dθ！）</text>
  <text x="18" y="42" font-size="12.5" fill="#333">小扇环块 ≈ 宽 dρ × 弧长 ρdθ = ρ dρ dθ</text>

  <!-- 极点 O (60,290) -->
  <circle cx="60" cy="290" r="3" fill="#444"/>
  <text x="46" y="298" font-size="12" fill="#444">O</text>
  <line x1="60" y1="290" x2="400" y2="290" stroke="#444" stroke-width="1.3" marker-end="url(#qd)"/>

  <!-- 两条射线 θ, θ+dθ -->
  <line x1="60" y1="290" x2="370" y2="160" stroke="#aaa" stroke-width="1"/>
  <line x1="60" y1="290" x2="340" y2="95" stroke="#aaa" stroke-width="1"/>

  <!-- 两条弧 ρ, ρ+dρ -->
  <path d="M214,196 A230,230 0 0,0 165,148" fill="none" stroke="#46c" stroke-width="1.5"/>
  <path d="M268,173 A290,290 0 0,0 205,113" fill="none" stroke="#46c" stroke-width="1.5"/>

  <!-- 高亮扇环小块 -->
  <path d="M214,196 A230,230 0 0,0 165,148 L205,113 A290,290 0 0,1 268,173 Z"
        fill="#ffe0b2" stroke="#e6a23c" stroke-width="2"/>

  <!-- 标注 dρ (沿径向宽) -->
  <line x1="240" y1="184" x2="237" y2="143" stroke="#e77" stroke-width="2.5"/>
  <text x="246" y="168" font-size="13" fill="#e77" font-weight="bold">dρ</text>

  <!-- 标注 ρdθ (弧长) -->
  <text x="150" y="180" font-size="13" fill="#2b7" font-weight="bold">ρdθ</text>
  <path d="M196,205 A245,245 0 0,0 150,150" fill="none" stroke="#2b7" stroke-width="2.5"/>

  <!-- ρ 半径标注 -->
  <line x1="60" y1="290" x2="214" y2="196" stroke="#c5a" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="120" y="252" font-size="13" fill="#c5a" font-weight="bold">ρ</text>
  <!-- dθ 角 -->
  <text x="92" y="278" font-size="12" fill="#888">dθ</text>

  <text x="30" y="316" font-size="10.5" fill="#888">离极点越远(ρ越大)，同样 dθ 张开的弧越长→小块越大，所以面积带因子 ρ</text>
</svg>
