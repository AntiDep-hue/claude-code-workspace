<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 290" font-family="sans-serif">
  <defs>
    <marker id="ar-g" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2b7"/></marker>
    <marker id="ar-c" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#c5a"/></marker>
  </defs>
  <text x="140" y="26" font-size="14" font-weight="bold" fill="#444" text-anchor="middle">格林:平面闭曲线 L 围平面块 D</text>
  <text x="420" y="26" font-size="14" font-weight="bold" fill="#444" text-anchor="middle">斯托克斯:空间闭曲线 Γ 绷出曲面 Σ</text>

  <!-- 左:平面圈围平面区域 -->
  <ellipse cx="140" cy="150" rx="85" ry="60" fill="#dff3e8" stroke="#2b7" stroke-width="2.5"/>
  <path d="M150,90 l13,3" stroke="#2b7" stroke-width="2.5" marker-end="url(#ar-g)"/>
  <text x="140" y="156" font-size="15" fill="#2b7" font-weight="bold" text-anchor="middle">D</text>
  <text x="232" y="120" font-size="13" fill="#2b7">L</text>
  <text x="140" y="240" font-size="12" fill="#888" text-anchor="middle">圈是平的,围一块平面</text>

  <line x1="280" y1="55" x2="280" y2="245" stroke="#eee" stroke-width="2"/>

  <!-- 右:空间扭圈绷出曲面(肥皂膜) -->
  <path d="M340,150 C350,95 420,80 460,105 C500,128 505,180 470,205 C432,232 360,215 348,175 C344,165 340,158 340,150 Z"
        fill="#f3e8f5" stroke="#c5a" stroke-width="2.5"/>
  <!-- 曲面的弯曲感:几条母线 -->
  <path d="M360,120 Q420,150 480,130" fill="none" stroke="#c5a" stroke-width="1" opacity="0.5"/>
  <path d="M360,180 Q420,150 478,178" fill="none" stroke="#c5a" stroke-width="1" opacity="0.5"/>
  <path d="M398,95 l12,5" stroke="#c5a" stroke-width="2.5" marker-end="url(#ar-c)"/>
  <text x="416" y="156" font-size="15" fill="#c5a" font-weight="bold" text-anchor="middle">Σ</text>
  <text x="508" y="118" font-size="13" fill="#c5a">Γ</text>
  <text x="420" y="252" font-size="12" fill="#888" text-anchor="middle">圈扭进空间,绷出一张膜</text>

  <text x="280" y="282" font-size="12.5" fill="#444" text-anchor="middle">把平面的格林「掀起来」,让它对空间曲面也成立</text>
</svg>
