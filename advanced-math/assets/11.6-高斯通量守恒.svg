<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 290" font-family="sans-serif">
  <text x="20" y="24" font-size="14" font-weight="bold" fill="#444">高斯公式：内部冒的水 = 表面流出的总量</text>

  <defs>
    <marker id="ar-o" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#e77"/>
    </marker>
  </defs>

  <!-- 闭区域 Ω (椭圆代表立体) -->
  <ellipse cx="220" cy="160" rx="120" ry="85" fill="#2b7" fill-opacity="0.10" stroke="#2b7" stroke-width="2"/>
  <text x="300" y="110" font-size="13" fill="#2b7" font-weight="bold">闭曲面 Σ</text>
  <text x="180" y="250" font-size="12" fill="#888">内部立体 Ω</text>

  <!-- 内部的"源"点(小圈,向外放射) -->
  <g>
    <circle cx="175" cy="150" r="4" fill="#46c"/>
    <circle cx="245" cy="135" r="4" fill="#46c"/>
    <circle cx="215" cy="185" r="4" fill="#46c"/>
  </g>
  <text x="150" y="130" font-size="11" fill="#46c">源 div A &gt; 0</text>

  <!-- 内部小放射箭头(散度) -->
  <g stroke="#46c" stroke-width="1.3" opacity="0.7">
    <line x1="175" y1="150" x2="160" y2="140"/>
    <line x1="175" y1="150" x2="190" y2="140"/>
    <line x1="245" y1="135" x2="258" y2="126"/>
    <line x1="245" y1="135" x2="234" y2="124"/>
    <line x1="215" y1="185" x2="205" y2="197"/>
    <line x1="215" y1="185" x2="227" y2="196"/>
  </g>

  <!-- 表面向外法向通量箭头 -->
  <g stroke="#e77" stroke-width="2">
    <line x1="100" y1="160" x2="72" y2="160" marker-end="url(#ar-o)"/>
    <line x1="220" y1="75" x2="220" y2="48" marker-end="url(#ar-o)"/>
    <line x1="340" y1="160" x2="368" y2="160" marker-end="url(#ar-o)"/>
    <line x1="220" y1="245" x2="220" y2="272" marker-end="url(#ar-o)"/>
    <line x1="135" y1="100" x2="113" y2="80" marker-end="url(#ar-o)"/>
    <line x1="305" y1="100" x2="327" y2="80" marker-end="url(#ar-o)"/>
  </g>

  <text x="20" y="288" font-size="12.5" fill="#444">∭_Ω div A dV  =  ∯_Σ A·dS （守恒，天经地义）</text>
</svg>
