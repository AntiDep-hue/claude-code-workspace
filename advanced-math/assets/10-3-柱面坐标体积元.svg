<svg viewBox="0 0 440 340" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="cd" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#444"/></marker>
  </defs>
  <rect x="8" y="6" width="424" height="44" rx="5" fill="#fbf4f4" stroke="#dcc"/>
  <text x="18" y="25" font-size="12.5" fill="#333" font-weight="bold">本图演算：柱面坐标体积元 dv = ρ dρ dθ dz</text>
  <text x="18" y="42" font-size="12.5" fill="#333">底是极坐标小扇环(ρdρdθ)，再乘高 dz</text>

  <!-- z轴 -->
  <line x1="110" y1="300" x2="110" y2="70" stroke="#444" stroke-width="1.3" marker-end="url(#cd)"/>
  <text x="98" y="82" font-size="12" fill="#444">z</text>
  <!-- x,y -->
  <line x1="110" y1="265" x2="45" y2="305" stroke="#444" stroke-width="1.3" marker-end="url(#cd)"/>
  <line x1="110" y1="265" x2="390" y2="240" stroke="#444" stroke-width="1.3" marker-end="url(#cd)"/>
  <text x="40" y="320" font-size="12" fill="#444">x</text>
  <text x="382" y="236" font-size="12" fill="#444">y</text>

  <!-- 底面小扇环块 -->
  <path d="M210,258 L255,254 L250,232 L208,236 Z" fill="#dff0e6" stroke="#2b7" stroke-width="1.5"/>
  <!-- 立起小柱体 -->
  <path d="M210,258 L255,254 L250,232 L208,236 Z" fill="#dff0e6" stroke="#2b7" stroke-width="1.2" transform="translate(0,-70)" opacity="0.55"/>
  <line x1="210" y1="258" x2="210" y2="188" stroke="#2b7" stroke-width="1.2"/>
  <line x1="255" y1="254" x2="255" y2="184" stroke="#2b7" stroke-width="1.2"/>
  <line x1="250" y1="232" x2="250" y2="162" stroke="#2b7" stroke-width="1.2"/>
  <line x1="208" y1="236" x2="208" y2="166" stroke="#2b7" stroke-width="1.2"/>

  <!-- 标注 -->
  <text x="258" y="250" font-size="12" fill="#e77" font-weight="bold">dρ</text>
  <text x="200" y="275" font-size="12" fill="#2b7" font-weight="bold">ρdθ</text>
  <text x="258" y="210" font-size="12" fill="#46c" font-weight="bold">dz</text>

  <!-- ρ 半径 -->
  <line x1="110" y1="265" x2="230" y2="245" stroke="#c5a" stroke-width="1.3" stroke-dasharray="5 3"/>
  <text x="160" y="265" font-size="12" fill="#c5a" font-weight="bold">ρ</text>
  <text x="124" y="258" font-size="11" fill="#888">θ</text>

  <text x="30" y="330" font-size="10.5" fill="#888">x=ρcosθ, y=ρsinθ, z=z；见旋转体/圆柱/含 x²+y² 就换它</text>
</svg>
