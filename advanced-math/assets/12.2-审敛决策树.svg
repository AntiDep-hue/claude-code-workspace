<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" font-family="sans-serif">
  <defs>
    <marker id="ad" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#888"/></marker>
  </defs>
  <text x="240" y="24" font-size="14" font-weight="bold" fill="#444" text-anchor="middle">拿到一道级数,审敛决策链</text>

  <!-- step1 -->
  <rect x="150" y="42" width="180" height="34" rx="6" fill="#fff6e6" stroke="#c5a" stroke-width="1.6"/>
  <text x="240" y="64" font-size="12.5" fill="#444" text-anchor="middle">① 通项 uₙ→0 吗?</text>
  <line x1="240" y1="76" x2="240" y2="100" stroke="#888" stroke-width="1.4" marker-end="url(#ad)"/>
  <text x="360" y="92" font-size="11" fill="#e77">否 → 直接发散,收工</text>

  <!-- step2 -->
  <rect x="140" y="102" width="200" height="34" rx="6" fill="#eef3fc" stroke="#46c" stroke-width="1.6"/>
  <text x="240" y="124" font-size="12.5" fill="#444" text-anchor="middle">② 是正项级数吗?</text>

  <!-- 正项分支 -->
  <line x1="240" y1="136" x2="130" y2="168" stroke="#888" stroke-width="1.4" marker-end="url(#ad)"/>
  <text x="120" y="158" font-size="10.5" fill="#2b7">是</text>
  <rect x="20" y="170" width="220" height="64" rx="6" fill="#dff3e8" stroke="#2b7" stroke-width="1.6"/>
  <text x="130" y="190" font-size="11.5" fill="#444" text-anchor="middle">比较法 / p-级数 / 几何级数</text>
  <text x="130" y="208" font-size="11.5" fill="#444" text-anchor="middle">带 n! 或 aⁿ → 比值法</text>
  <text x="130" y="226" font-size="11.5" fill="#444" text-anchor="middle">带 (·)ⁿ → 根值法(ρ=1回比较)</text>

  <!-- 交错/一般分支 -->
  <line x1="240" y1="136" x2="360" y2="168" stroke="#888" stroke-width="1.4" marker-end="url(#ad)"/>
  <text x="356" y="158" font-size="10.5" fill="#46c">否</text>
  <rect x="258" y="170" width="200" height="34" rx="6" fill="#f3e8f5" stroke="#c5a" stroke-width="1.6"/>
  <text x="358" y="192" font-size="11.5" fill="#444" text-anchor="middle">③ 交错? → 莱布尼茨</text>

  <line x1="358" y1="204" x2="358" y2="228" stroke="#888" stroke-width="1.4" marker-end="url(#ad)"/>
  <rect x="248" y="230" width="220" height="58" rx="6" fill="#f3e8f5" stroke="#c5a" stroke-width="1.6"/>
  <text x="358" y="250" font-size="11.5" fill="#444" text-anchor="middle">④ 符号杂乱 → 先判 ∑|uₙ|</text>
  <text x="358" y="268" font-size="11" fill="#888" text-anchor="middle">∑|uₙ|收敛→绝对收敛</text>
  <text x="358" y="283" font-size="11" fill="#888" text-anchor="middle">仅原级数收敛→条件收敛</text>

  <text x="240" y="320" font-size="12" fill="#444" text-anchor="middle">每件工具对应一种"级数长相"——先认相,再下手</text>
  <text x="240" y="340" font-size="11.5" fill="#888" text-anchor="middle">这条链专治"定理看得懂、题不会下手"</text>
</svg>
