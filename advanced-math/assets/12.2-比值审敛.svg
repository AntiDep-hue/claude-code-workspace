<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" font-family="sans-serif">
  <!-- 本图演算框 -->
  <rect x="20" y="8" width="480" height="30" rx="5" fill="#fdf6e3" stroke="#d9b14a" stroke-width="1"/>
  <text x="260" y="22" font-size="11.5" fill="#9a7b1a" text-anchor="middle" font-weight="bold">本图演算的是（比值法那行）：</text>
  <text x="260" y="34" font-size="12.5" fill="#7a5d0a" text-anchor="middle" font-weight="bold">ρ = lim uₙ₊₁/uₙ   ← 每项是前项的 ρ 倍，逐项摆出来看尾巴收不收</text>

  <!-- ρ<1 收敛:每项×ρ,逐个生成,越来越短 -->
  <text x="20" y="62" font-size="12.5" fill="#2b7" font-weight="bold">ρ&lt;1：uₙ₊₁=ρ·uₙ，像几何级数般缩 → 尾巴收拢成有限和（收敛）</text>
  <g fill="#2b7" fill-opacity="0.35" stroke="#2b7" stroke-width="1">
    <rect x="35" y="74" width="0" height="20"><animate attributeName="width" from="0" to="64" dur="0.4s" begin="0.1s" fill="freeze"/></rect>
    <rect x="103" y="74" width="0" height="20"><animate attributeName="width" from="0" to="42" dur="0.4s" begin="0.6s" fill="freeze"/></rect>
    <rect x="149" y="74" width="0" height="20"><animate attributeName="width" from="0" to="27" dur="0.4s" begin="1.1s" fill="freeze"/></rect>
    <rect x="180" y="74" width="0" height="20"><animate attributeName="width" from="0" to="18" dur="0.4s" begin="1.6s" fill="freeze"/></rect>
    <rect x="202" y="74" width="0" height="20"><animate attributeName="width" from="0" to="12" dur="0.4s" begin="2.0s" fill="freeze"/></rect>
    <rect x="218" y="74" width="0" height="20"><animate attributeName="width" from="0" to="8" dur="0.4s" begin="2.3s" fill="freeze"/></rect>
    <rect x="230" y="74" width="0" height="20"><animate attributeName="width" from="0" to="5" dur="0.4s" begin="2.5s" fill="freeze"/></rect>
  </g>
  <text x="40" y="110" font-size="10" fill="#2b7">u₁</text>
  <text x="112" y="110" font-size="10" fill="#2b7">u₂=ρu₁</text>
  <text x="158" y="110" font-size="10" fill="#2b7">u₃</text>
  <!-- 收拢标记 -->
  <line x1="245" y1="84" x2="270" y2="84" stroke="#2b7" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="274" y="88" font-size="10.5" fill="#2b7" opacity="0">尾巴→0，总和有限
    <animate attributeName="opacity" from="0" to="1" begin="2.7s" dur="0.4s" fill="freeze"/>
  </text>

  <!-- ρ>1 发散:每项×ρ,越来越长 -->
  <text x="20" y="146" font-size="12.5" fill="#e44" font-weight="bold">ρ&gt;1：uₙ₊₁=ρ·uₙ 越涨越大，uₙ↛0 → 发散</text>
  <g fill="#e44" fill-opacity="0.35" stroke="#e44" stroke-width="1">
    <rect x="35" y="158" width="0" height="20"><animate attributeName="width" from="0" to="16" dur="0.4s" begin="0.1s" fill="freeze"/></rect>
    <rect x="55" y="158" width="0" height="20"><animate attributeName="width" from="0" to="26" dur="0.4s" begin="0.6s" fill="freeze"/></rect>
    <rect x="85" y="158" width="0" height="20"><animate attributeName="width" from="0" to="42" dur="0.4s" begin="1.1s" fill="freeze"/></rect>
    <rect x="131" y="158" width="0" height="20"><animate attributeName="width" from="0" to="67" dur="0.4s" begin="1.6s" fill="freeze"/></rect>
    <rect x="202" y="158" width="0" height="20"><animate attributeName="width" from="0" to="107" dur="0.4s" begin="2.1s" fill="freeze"/></rect>
  </g>
  <text x="40" y="194" font-size="10" fill="#e44">u₁</text>
  <text x="60" y="194" font-size="10" fill="#e44">u₂</text>
  <text x="318" y="172" font-size="10.5" fill="#e44" opacity="0">…冲出去
    <animate attributeName="opacity" from="0" to="1" begin="2.5s" dur="0.4s" fill="freeze"/>
  </text>

  <!-- ρ=1 失效 -->
  <text x="20" y="226" font-size="12.5" fill="#c5a" font-weight="bold">ρ=1：缩放倍率恰为 1，项不缩也不涨——此法失效，改用比较法 / p-级数</text>

  <text x="20" y="266" font-size="11.5" fill="#888">根值法 ρ=lim ⁿ√uₙ 同理：ρ&lt;1 收敛、ρ&gt;1 发散、ρ=1 失效</text>
  <text x="20" y="286" font-size="11" fill="#999">（动画停在终态：上排收成一串收拢的短条，下排涨成发散的长条）</text>
</svg>
