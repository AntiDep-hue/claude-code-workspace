<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 250" font-family="sans-serif">
  <text x="20" y="24" font-size="14" font-weight="bold" fill="#444">比值审敛法：看相邻项的"缩放倍率" ρ = lim uₙ₊₁/uₙ</text>

  <!-- ρ<1 收敛 -->
  <text x="20" y="56" font-size="12.5" fill="#2b7" font-weight="bold">ρ&lt;1：每项约是前一项的 ρ 倍，像几何级数般迅速缩小 → 收敛</text>
  <g fill="#2b7" fill-opacity="0.3" stroke="#2b7" stroke-width="1">
    <rect x="35" y="68" width="60" height="18"/>
    <rect x="100" y="68" width="36" height="18"/>
    <rect x="141" y="68" width="22" height="18"/>
    <rect x="168" y="68" width="13" height="18"/>
    <rect x="186" y="68" width="8" height="18"/>
  </g>
  <text x="205" y="81" font-size="11" fill="#2b7">×ρ ×ρ ×ρ … 越乘越小</text>

  <!-- ρ>1 发散 -->
  <text x="20" y="124" font-size="12.5" fill="#e77" font-weight="bold">ρ&gt;1：每项反而越来越大，通项不趋于0 → 发散</text>
  <g fill="#e77" fill-opacity="0.3" stroke="#e77" stroke-width="1">
    <rect x="35" y="136" width="20" height="18"/>
    <rect x="60" y="136" width="32" height="18"/>
    <rect x="97" y="136" width="50" height="18"/>
    <rect x="152" y="136" width="78" height="18"/>
  </g>
  <text x="240" y="149" font-size="11" fill="#e77">×ρ ×ρ … 越乘越大</text>

  <!-- ρ=1 失效 -->
  <text x="20" y="192" font-size="12.5" fill="#c5a" font-weight="bold">ρ=1：失效！此法判不了，要另想办法（如比较法、p-级数）</text>

  <text x="20" y="228" font-size="11.5" fill="#888">根值法 lim ⁿ√uₙ = ρ 同理：ρ&lt;1 收敛，ρ&gt;1 发散，ρ=1 失效</text>
</svg>
