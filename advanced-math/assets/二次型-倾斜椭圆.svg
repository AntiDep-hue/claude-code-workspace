<svg viewBox="0 0 560 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="ag" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#666"/>
    </marker>
    <marker id="ab" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="ad" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#d44"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="560" height="380" fill="#fafafa" rx="6"/>

  <!-- 本图演算框 -->
  <rect x="12" y="10" width="536" height="30" rx="4" fill="#e8f0fe" stroke="#90b8f8" stroke-width="0.8"/>
  <text x="280" y="30" text-anchor="middle" font-size="12" fill="#2b5797" font-family="sans-serif" font-weight="bold">
    本图演算: 比较 f=3x²+3y² (无交叉项, 圆) 与 f=3x²+2xy+3y² (有交叉项, 椭圆倾斜 45°)
  </text>

  <!-- ===== 左半: 无交叉项 (圆) ===== -->
  <text x="140" y="62" font-size="14" fill="#2563eb" font-family="sans-serif" font-weight="bold" text-anchor="middle">
    f = 3x² + 3y²  (无交叉项)
  </text>
  <text x="140" y="80" font-size="11" fill="#888" font-family="sans-serif" text-anchor="middle">矩阵 [[3,0],[0,3]], 等高线 = 圆</text>

  <!-- 坐标 -->
  <line x1="20" y1="200" x2="260" y2="200" stroke="#666" stroke-width="1.2" marker-end="url(#ag)"/>
  <line x1="140" y1="310" x2="140" y2="90" stroke="#666" stroke-width="1.2" marker-end="url(#ag)"/>
  <text x="252" y="215" font-size="12" fill="#666" font-family="sans-serif">x</text>
  <text x="132" y="85" font-size="12" fill="#666" font-family="sans-serif">y</text>

  <!-- 圆 -->
  <circle cx="140" cy="200" r="60" fill="none" stroke="#2563eb" stroke-width="2"/>

  <!-- 圆上选点标注 -->
  <text x="150" y="158" font-size="12" fill="#444" font-family="sans-serif">主轴 = 任意方向</text>
  <line x1="140" y1="200" x2="183" y2="157" stroke="#888" stroke-width="0.8" stroke-dasharray="3,3"/>

  <!-- 分隔线 -->
  <line x1="285" y1="50" x2="285" y2="340" stroke="#ccc" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- ===== 右半: 有交叉项 (椭圆) ===== -->
  <text x="422" y="62" font-size="14" fill="#d44" font-family="sans-serif" font-weight="bold" text-anchor="middle">
    f = 3x² + 2xy + 3y²  (有交叉项)
  </text>
  <text x="422" y="80" font-size="11" fill="#888" font-family="sans-serif" text-anchor="middle">矩阵 [[3,1],[1,3]], 等高线 = 倾斜椭圆</text>

  <!-- 坐标 -->
  <line x1="305" y1="200" x2="545" y2="200" stroke="#666" stroke-width="1.2" marker-end="url(#ag)"/>
  <line x1="422" y1="310" x2="422" y2="90" stroke="#666" stroke-width="1.2" marker-end="url(#ag)"/>
  <text x="537" y="215" font-size="12" fill="#666" font-family="sans-serif">x</text>
  <text x="414" y="85" font-size="12" fill="#666" font-family="sans-serif">y</text>

  <!-- 椭圆: rx=√2·60≈85, ry=1·60=60, rotate 45° -->
  <ellipse cx="422" cy="200" rx="85" ry="60" transform="rotate(45 422 200)"
           fill="none" stroke="#d44" stroke-width="2"/>

  <!-- 主轴 (红虚线, 45°) -->
  <line x1="362" y1="260" x2="482" y2="140" stroke="#d44" stroke-width="1.5" stroke-dasharray="7,4" marker-end="url(#ad)"/>
  <line x1="362" y1="140" x2="482" y2="260" stroke="#d44" stroke-width="1.5" stroke-dasharray="7,4"/>

  <!-- 主轴标签 -->
  <text x="486" y="135" font-size="12" fill="#d44" font-family="sans-serif">λ=4 (短轴)</text>
  <text x="486" y="275" font-size="12" fill="#d44" font-family="sans-serif">λ=2 (长轴)</text>

  <!-- 交叉项标注 -->
  <text x="370" y="170" font-size="12" fill="#d44" font-family="sans-serif" font-weight="bold">2xy</text>
  <line x1="370" y1="173" x2="395" y2="188" stroke="#d44" stroke-width="0.8"/>

  <!-- 倾斜角度标注 -->
  <path d="M 455,195 A 30,30 0 0,0 443,183" fill="none" stroke="#d44" stroke-width="1.2"/>
  <text x="465" y="182" font-size="11" fill="#d44" font-family="sans-serif">45°</text>

  <!-- 底部结论 -->
  <rect x="30" y="330" width="500" height="38" rx="5" fill="#fff3cd" stroke="#ffc107" stroke-width="1"/>
  <text x="280" y="346" font-size="13" fill="#856404" font-family="sans-serif" text-anchor="middle">
    交叉项 2xy ≠ 0 → 等高线倾斜 → 椭圆的对称轴不再和坐标轴平行
  </text>
  <text x="280" y="361" font-size="12" fill="#856404" font-family="sans-serif" text-anchor="middle">
    要消掉交叉项 = 把坐标轴旋转到和椭圆主轴对齐
  </text>
</svg>
