<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" font-family="sans-serif">
  <defs>
    <marker id="ar-b" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#46c"/></marker>
    <marker id="ar-d" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#888"/></marker>
  </defs>
  <text x="280" y="26" font-size="14" font-weight="bold" fill="#444" text-anchor="middle">同一个量(通量),两条路:看曲面封不封闭</text>

  <!-- 左:开曲面→合一投影 -->
  <text x="150" y="54" font-size="13" font-weight="bold" fill="#2b7" text-anchor="middle">单片开曲面 → 合一投影公式</text>
  <!-- 抛物面单片 + 法向 -->
  <path d="M70,150 Q150,90 230,150" fill="none" stroke="#2b7" stroke-width="2.5"/>
  <line x1="150" y1="118" x2="150" y2="86" stroke="#46c" stroke-width="2.5" marker-end="url(#ar-b)"/>
  <text x="158" y="98" font-size="11" fill="#46c">n(上侧)</text>
  <!-- 投影到xy面 -->
  <line x1="70" y1="150" x2="70" y2="200" stroke="#888" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="230" y1="150" x2="230" y2="200" stroke="#888" stroke-width="1" stroke-dasharray="4 3"/>
  <ellipse cx="150" cy="200" rx="80" ry="18" fill="#dff3e8" stroke="#2b7" stroke-width="1.6"/>
  <text x="150" y="205" font-size="12" fill="#2b7" text-anchor="middle">D_xy</text>
  <text x="150" y="240" font-size="11.5" fill="#888" text-anchor="middle">投影到 xy 面,算二重积分</text>
  <text x="150" y="262" font-size="11" fill="#444" text-anchor="middle">∬[P(−z_x)+Q(−z_y)+R]dxdy</text>

  <line x1="290" y1="50" x2="290" y2="270" stroke="#eee" stroke-width="2"/>

  <!-- 右:封闭曲面→高斯 -->
  <text x="420" y="54" font-size="13" font-weight="bold" fill="#46c" text-anchor="middle">封闭曲面 → 高斯公式</text>
  <ellipse cx="420" cy="150" rx="70" ry="55" fill="#dde7fa" stroke="#46c" stroke-width="2.5"/>
  <ellipse cx="420" cy="150" rx="70" ry="16" fill="none" stroke="#46c" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
  <text x="420" y="155" font-size="13" fill="#46c" font-weight="bold" text-anchor="middle">Ω</text>
  <line x1="420" y1="98" x2="420" y2="76" stroke="#46c" stroke-width="2" marker-end="url(#ar-b)"/>
  <line x1="490" y1="150" x2="512" y2="150" stroke="#46c" stroke-width="2" marker-end="url(#ar-b)"/>
  <line x1="350" y1="150" x2="328" y2="150" stroke="#46c" stroke-width="2" marker-end="url(#ar-b)"/>
  <text x="420" y="240" font-size="11.5" fill="#888" text-anchor="middle">转成内部三重积分</text>
  <text x="420" y="262" font-size="11" fill="#444" text-anchor="middle">∭ div A dV</text>

  <text x="280" y="290" font-size="12" fill="#444" text-anchor="middle">开曲面不封闭→投影；要补面凑封闭时,补的那片也用投影法算(见第2题)</text>
</svg>
