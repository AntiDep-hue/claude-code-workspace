<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 380" font-family="sans-serif">
  <!-- 本图演算框 -->
  <rect x="8" y="6" width="454" height="40" rx="5" fill="#f3f6fb" stroke="#cdd8ea"/>
  <text x="18" y="23" font-size="12" fill="#445">本图演算　∫₋π^π cos kx·cos nx dx ：异频(k≠n)→0，同频(k=n)→π</text>
  <text x="18" y="38" font-size="12" fill="#445">正交性——乘积的"正负面积"在一个周期上相消(异频)或全正(同频)</text>

  <!-- 上图: 异频 cos x · cos 2x, 归零 -->
  <text x="20" y="70" font-size="12.5" fill="#445" font-weight="bold">异频　cos x · cos 2x</text>
  <line x1="40" y1="120" x2="440" y2="120" stroke="#444" stroke-width="1.2"/>
  <text x="32" y="92" font-size="10" fill="#888">+</text>
  <text x="32" y="152" font-size="10" fill="#888">−</text>
  <!-- 乘积曲线 (示意: 正负面积相等) -->
  <path d="M40,120 Q80,80 120,120 T200,120 Q240,160 280,120 T360,120 Q400,80 440,120"
        fill="none" stroke="#c5a" stroke-width="2"/>
  <!-- 正负填充示意 -->
  <path d="M40,120 Q80,80 120,120 Z" fill="#c5a" opacity="0.18"/>
  <path d="M200,120 Q240,160 280,120 Z" fill="#46c" opacity="0.18"/>
  <path d="M360,120 Q400,80 440,120 Z" fill="#c5a" opacity="0.18"/>
  <text x="300" y="100" font-size="12" fill="#2b7" font-weight="bold">正负抵消 → ∫ = 0</text>

  <!-- 下图: 同频 cos²x, 全正 -->
  <text x="20" y="195" font-size="12.5" fill="#445" font-weight="bold">同频　cos²x = (1+cos2x)/2 ≥ 0</text>
  <line x1="40" y1="300" x2="440" y2="300" stroke="#444" stroke-width="1.2"/>
  <text x="32" y="272" font-size="10" fill="#888">+</text>
  <!-- cos²x 全在轴上方 -->
  <path d="M40,300 Q60,235 80,300 Q100,235 120,300 Q140,235 160,300 Q180,235 200,300 Q220,235 240,300 Q260,235 280,300 Q300,235 320,300 Q340,235 360,300 Q380,235 400,300 Q420,235 440,300"
        fill="#e77" opacity="0.18"/>
  <path d="M40,300 Q60,235 80,300 Q100,235 120,300 Q140,235 160,300 Q180,235 200,300 Q220,235 240,300 Q260,235 280,300 Q300,235 320,300 Q340,235 360,300 Q380,235 400,300 Q420,235 440,300"
        fill="none" stroke="#e77" stroke-width="2"/>
  <text x="300" y="255" font-size="12" fill="#e77" font-weight="bold">面积全为正 → ∫ = π</text>

  <text x="20" y="345" font-size="11.5" fill="#666">求 aₙ：级数 ×cos nx 再积分，异频项全归零，只剩同频那一项 → aₙ·π</text>
  <text x="20" y="364" font-size="11" fill="#888">这就是"乘 cos nx 再积分能单独抠出 aₙ"的机理</text>
</svg>
