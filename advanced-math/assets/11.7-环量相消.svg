<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 320" font-family="sans-serif">
  <defs>
    <marker id="ar-r" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#e77"/></marker>
    <marker id="ar-c" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#c5a"/></marker>
  </defs>
  <text x="210" y="26" font-size="14" font-weight="bold" fill="#444" text-anchor="middle">内部小漩涡两两相消,只剩最外圈</text>

  <!-- 曲面分成 2x2 小块,每块一个逆时针小环 -->
  <g stroke="#ddd" stroke-width="1.5" fill="#faf6fb">
    <rect x="110" y="70" width="100" height="100"/>
    <rect x="210" y="70" width="100" height="100"/>
    <rect x="110" y="170" width="100" height="100"/>
    <rect x="210" y="170" width="100" height="100"/>
  </g>
  <!-- 每格逆时针小箭头 -->
  <g stroke="#e77" stroke-width="2" fill="none" opacity="1">
    <animate attributeName="opacity" values="1;1;0.15" keyTimes="0;0.4;1" dur="3s" fill="freeze"/>
    <path d="M185,95 A40,40 0 1 1 184,95" marker-end="url(#ar-r)"/>
    <path d="M285,95 A40,40 0 1 1 284,95" marker-end="url(#ar-r)"/>
    <path d="M185,195 A40,40 0 1 1 184,195" marker-end="url(#ar-r)"/>
    <path d="M285,195 A40,40 0 1 1 284,195" marker-end="url(#ar-r)"/>
  </g>
  <!-- 公共内壁:相邻两环方向相反,标注相消 -->
  <g opacity="1"><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.4;1" dur="3s" fill="freeze"/>
    <line x1="210" y1="90" x2="210" y2="150" stroke="#46c" stroke-width="3"/>
    <line x1="210" y1="190" x2="210" y2="250" stroke="#46c" stroke-width="3"/>
    <line x1="130" y1="170" x2="190" y2="170" stroke="#46c" stroke-width="3"/>
    <line x1="230" y1="170" x2="290" y2="170" stroke="#46c" stroke-width="3"/>
    <text x="246" y="166" font-size="11" fill="#46c">相消</text>
  </g>

  <!-- 相消后:外圈大环量保留 -->
  <g stroke="#c5a" stroke-width="3" fill="none" opacity="0">
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.5;1" dur="3s" fill="freeze"/>
    <path d="M310,170 A100,100 0 0 1 263,254" marker-end="url(#ar-c)"/>
    <path d="M157,254 A100,100 0 0 1 110,170" marker-end="url(#ar-c)"/>
    <path d="M110,170 A100,100 0 0 1 157,86" marker-end="url(#ar-c)"/>
    <path d="M263,86 A100,100 0 0 1 310,170" marker-end="url(#ar-c)"/>
  </g>

  <text x="210" y="296" font-size="12.5" fill="#888" text-anchor="middle">相邻格公共边:方向相反、大小相等 → 抵消</text>
  <text x="210" y="314" font-size="12.5" fill="#444" text-anchor="middle">∬ rot A·dS(内部漩涡累加) = ∮ A·dr(边缘环量)</text>
</svg>
