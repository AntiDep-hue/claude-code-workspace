<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 270" font-family="sans-serif">
  <defs>
    <marker id="ad" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#888"/></marker>
  </defs>
  <text x="240" y="24" font-size="14" font-weight="bold" fill="#444" text-anchor="middle">绝对收敛 vs 条件收敛:先看 ∑|uₙ|</text>

  <!-- 任意级数盒子 -->
  <rect x="180" y="42" width="120" height="32" rx="6" fill="#eef3fc" stroke="#46c" stroke-width="1.6"/>
  <text x="240" y="63" font-size="12.5" fill="#444" text-anchor="middle">一般级数 ∑uₙ</text>
  <text x="240" y="92" font-size="11.5" fill="#888" text-anchor="middle">先取绝对值 → ∑|uₙ| (正项,工具全)</text>
  <line x1="240" y1="74" x2="240" y2="100" stroke="#888" stroke-width="1.4" marker-end="url(#ad)"/>

  <!-- 左:∑|uₙ|收敛 -->
  <line x1="240" y1="104" x2="120" y2="138" stroke="#888" stroke-width="1.4" marker-end="url(#ad)"/>
  <text x="150" y="124" font-size="10.5" fill="#2b7">∑|uₙ| 收敛</text>
  <rect x="20" y="140" width="200" height="62" rx="6" fill="#dff3e8" stroke="#2b7" stroke-width="1.6"/>
  <text x="120" y="162" font-size="12.5" fill="#2b7" font-weight="bold" text-anchor="middle">绝对收敛</text>
  <text x="120" y="182" font-size="11" fill="#444" text-anchor="middle">⟹ 原级数必收敛(定理7)</text>
  <text x="120" y="197" font-size="11" fill="#888" text-anchor="middle">最"结实"的收敛</text>

  <!-- 右:∑|uₙ|发散但原级数收敛 -->
  <line x1="240" y1="104" x2="360" y2="138" stroke="#888" stroke-width="1.4" marker-end="url(#ad)"/>
  <text x="312" y="124" font-size="10.5" fill="#e77">∑|uₙ| 发散</text>
  <rect x="260" y="140" width="200" height="62" rx="6" fill="#fdeceb" stroke="#e77" stroke-width="1.6"/>
  <text x="360" y="162" font-size="12.5" fill="#e77" font-weight="bold" text-anchor="middle">条件收敛</text>
  <text x="360" y="182" font-size="11" fill="#444" text-anchor="middle">原级数收敛、绝对值发散</text>
  <text x="360" y="197" font-size="11" fill="#888" text-anchor="middle">如 1−½+⅓−¼+…</text>

  <text x="240" y="230" font-size="12" fill="#444" text-anchor="middle">拿到杂乱符号级数,第一招永远是判 ∑|uₙ|</text>
  <text x="240" y="250" font-size="11" fill="#888" text-anchor="middle">注:若用比值/根值法算出 ρ&gt;1,则原级数直接发散(uₙ↛0)</text>
</svg>
