<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="sans-serif">
  <defs>
    <marker id="ar-d" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#444"/></marker>
  </defs>
  <text x="240" y="24" font-size="13.5" font-weight="bold" fill="#444" text-anchor="middle">侧视(沿 y 轴看)：曲面变陡，yz 向影子按 z_x 倍长出来</text>

  <!-- 坐标轴:x水平 z竖直 -->
  <line x1="90" y1="250" x2="445" y2="250" stroke="#444" stroke-width="1.5" marker-end="url(#ar-d)"/>
  <text x="450" y="254" font-size="12" fill="#444">x</text>
  <line x1="120" y1="250" x2="120" y2="55" stroke="#444" stroke-width="1.5" marker-end="url(#ar-d)"/>
  <text x="108" y="66" font-size="12" fill="#444">z</text>

  <!-- 浅斜位置的虚影(静态参考,暂停也看得到对比) -->
  <line x1="170" y1="170" x2="320" y2="150" stroke="#bbb" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="324" y="150" font-size="10.5" fill="#bbb">浅</text>

  <!-- xy 向影子 dx:始终不变,贴在 x 轴上 -->
  <line x1="170" y1="250" x2="320" y2="250" stroke="#e77" stroke-width="4"/>
  <line x1="170" y1="170" x2="170" y2="250" stroke="#aaa" stroke-width="0.8" stroke-dasharray="3 3"/>
  <line x1="320" y1="170" x2="320" y2="250" stroke="#aaa" stroke-width="0.8" stroke-dasharray="3 3">
    <animate attributeName="y1" from="150" to="78" dur="2.6s" fill="freeze"/>
  </line>
  <text x="245" y="268" font-size="12" fill="#e77" font-weight="bold" text-anchor="middle">dx (xy 向影子，不变)</text>

  <!-- 曲面元:左端钉在(170,170),右端抬高变陡 -->
  <line x1="170" y1="170" x2="320" y2="150" stroke="#2b7" stroke-width="4">
    <animate attributeName="y2" from="150" to="78" dur="2.6s" fill="freeze"/>
  </line>
  <circle cx="170" cy="170" r="4" fill="#2b7"/>
  <text x="196" y="150" font-size="12.5" fill="#2b7" font-weight="bold">曲面元 dS</text>

  <!-- yz 向影子 dz:竖直方向,随变陡而长 -->
  <line x1="335" y1="170" x2="335" y2="150" stroke="#46c" stroke-width="4">
    <animate attributeName="y2" from="150" to="78" dur="2.6s" fill="freeze"/>
  </line>
  <text x="345" y="120" font-size="12" fill="#46c" font-weight="bold">dz = z_x·dx</text>
  <text x="345" y="138" font-size="11" fill="#46c">(yz 向影子)</text>

  <text x="240" y="290" font-size="12.5" fill="#444" text-anchor="middle">dx 固定，dz 正比于斜率 z_x ⟹ |dydz| = z_x·|dxdy|，定号给负号：dydz = (−z_x)dxdy</text>
</svg>
