<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" font-family="sans-serif">
  <defs>
    <marker id="ar-b" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#46c"/></marker>
    <marker id="ar-g" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2b7"/></marker>
    <marker id="ar-d" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#888"/></marker>
  </defs>
  <text x="240" y="26" font-size="14" font-weight="bold" fill="#444" text-anchor="middle">侧视图:为什么是 −z_x，根号为什么相消</text>

  <!-- 地面(xy平面 edge-on) -->
  <line x1="40" y1="230" x2="440" y2="230" stroke="#444" stroke-width="1.6" marker-end="url(#ar-d)"/>
  <text x="446" y="234" font-size="12" fill="#444">x</text>
  <text x="60" y="250" font-size="12" fill="#888">xy 平面（投影面 D_xy）</text>

  <!-- 竖直 z 方向参考 -->
  <line x1="200" y1="230" x2="200" y2="55" stroke="#ddd" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="206" y="66" font-size="12" fill="#888">z（竖直）</text>

  <!-- 曲面元 dS:一段斜线 -->
  <line x1="150" y1="190" x2="250" y2="140" stroke="#2b7" stroke-width="3.5"/>
  <text x="186" y="158" font-size="13" fill="#2b7" font-weight="bold">dS</text>
  <text x="150" y="128" font-size="11.5" fill="#2b7">曲面元（斜率 z_x）</text>

  <!-- dS 在地面的投影 dx -->
  <line x1="150" y1="190" x2="150" y2="230" stroke="#888" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="250" y1="140" x2="250" y2="230" stroke="#888" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="150" y1="230" x2="250" y2="230" stroke="#e77" stroke-width="3.5"/>
  <text x="200" y="224" font-size="13" fill="#e77" font-weight="bold" text-anchor="middle">dx = dS·cosγ</text>

  <!-- 法向量 n 从 dS 中点出发,上左方向 -->
  <line x1="200" y1="165" x2="166" y2="92" stroke="#46c" stroke-width="3" marker-end="url(#ar-b)"/>
  <text x="120" y="92" font-size="13" fill="#46c" font-weight="bold">n=(−z_x,−z_y,1)</text>

  <!-- γ 角:n 与竖直方向夹角 -->
  <path d="M200,128 A37,37 0 0 1 184,135" fill="none" stroke="#c5a" stroke-width="1.6"/>
  <text x="208" y="120" font-size="13" fill="#c5a" font-weight="bold">γ</text>

  <text x="240" y="284" font-size="12.5" fill="#444" text-anchor="middle">cosγ = n 的 z 分量 = 1 / √(1+z_x²+z_y²)</text>
  <text x="240" y="304" font-size="12.5" fill="#444" text-anchor="middle">dS·cosγ 里的 1/√… 与 dS=√…·dxdy 的 √… 恰好约掉 → 只剩 dxdy</text>
</svg>
