<svg viewBox="0 0 440 350" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="hd" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#444"/></marker>
  </defs>
  <rect x="8" y="6" width="424" height="44" rx="5" fill="#fbf4f4" stroke="#dcc"/>
  <text x="18" y="25" font-size="12.5" fill="#333" font-weight="bold">本图演算：球面坐标体积元 dv = r² sinφ dr dφ dθ</text>
  <text x="18" y="42" font-size="12.5" fill="#333">三棱长: dr × (r dφ) × (r sinφ dθ) = r²sinφ dr dφ dθ</text>

  <!-- z轴 -->
  <line x1="130" y1="300" x2="130" y2="70" stroke="#444" stroke-width="1.3" marker-end="url(#hd)"/>
  <text x="118" y="82" font-size="12" fill="#444">z</text>
  <line x1="130" y1="265" x2="60" y2="305" stroke="#444" stroke-width="1.3" marker-end="url(#hd)"/>
  <line x1="130" y1="265" x2="400" y2="245" stroke="#444" stroke-width="1.3" marker-end="url(#hd)"/>
  <text x="54" y="320" font-size="12" fill="#444">x</text>
  <text x="392" y="240" font-size="12" fill="#444">y</text>
  <circle cx="130" cy="265" r="2.5" fill="#444"/><text x="116" y="280" font-size="11" fill="#444">O</text>

  <!-- 向径 r 到点 P -->
  <line x1="130" y1="265" x2="270" y2="150" stroke="#c5a" stroke-width="1.6"/>
  <text x="195" y="195" font-size="13" fill="#c5a" font-weight="bold">r</text>
  <circle cx="270" cy="150" r="3.5" fill="#333"/>
  <!-- φ 角(与z轴) -->
  <path d="M130,205 A60,60 0 0,1 158,222" fill="none" stroke="#e77" stroke-width="1.5"/>
  <text x="138" y="200" font-size="12" fill="#e77" font-weight="bold">φ</text>
  <!-- θ角(xy面投影) -->
  <text x="150" y="262" font-size="12" fill="#2b7" font-weight="bold">θ</text>

  <!-- 小体积块（在 P 处一小块） -->
  <path d="M270,150 L292,142 L286,124 L264,132 Z" fill="#ffe0b2" stroke="#e6a23c" stroke-width="1.5"/>
  <line x1="270" y1="150" x2="282" y2="166" stroke="#e6a23c" stroke-width="1.2"/>

  <!-- 三棱标注 -->
  <text x="293" y="138" font-size="11.5" fill="#46c" font-weight="bold">dr</text>
  <text x="240" y="120" font-size="11.5" fill="#e77" font-weight="bold">r dφ</text>
  <text x="285" y="178" font-size="11.5" fill="#2b7" font-weight="bold">r sinφ dθ</text>

  <text x="30" y="335" font-size="10.5" fill="#888">见球/球壳/锥、含 x²+y²+z² 就换它；那个 r²sinφ 别漏</text>
</svg>
