<svg viewBox="0 0 440 330" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="ud" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#444"/></marker>
  </defs>
  <rect x="8" y="6" width="424" height="44" rx="5" fill="#f4f6fb" stroke="#ccd"/>
  <text x="18" y="25" font-size="12.5" fill="#333" font-weight="bold">本图演算：曲面面积元 dS = √(1+z_x²+z_y²) dσ</text>
  <text x="18" y="42" font-size="12.5" fill="#333">投影小块 dσ 放大成倾斜的 dS，倍率就是那个根号</text>

  <!-- z轴 -->
  <line x1="120" y1="300" x2="120" y2="70" stroke="#444" stroke-width="1.3" marker-end="url(#ud)"/>
  <text x="108" y="82" font-size="12" fill="#444">z</text>
  <line x1="120" y1="260" x2="55" y2="300" stroke="#444" stroke-width="1.3" marker-end="url(#ud)"/>
  <line x1="120" y1="260" x2="400" y2="238" stroke="#444" stroke-width="1.3" marker-end="url(#ud)"/>
  <text x="48" y="315" font-size="12" fill="#444">x</text>
  <text x="392" y="234" font-size="12" fill="#444">y</text>

  <!-- 曲面片 dS（倾斜平行四边形，高处） -->
  <polygon points="210,150 268,142 280,118 222,126" fill="#f6d5d5" stroke="#e77" stroke-width="2"/>
  <text x="284" y="128" font-size="13" fill="#e77" font-weight="bold">dS（曲面上）</text>

  <!-- 投影 dσ（底面小矩形） -->
  <polygon points="210,250 268,244 264,222 206,228" fill="#dff0e6" stroke="#2b7" stroke-width="2"/>
  <text x="200" y="268" font-size="13" fill="#2b7" font-weight="bold">dσ=dxdy（投影）</text>

  <!-- 投影虚线 -->
  <line x1="210" y1="150" x2="210" y2="250" stroke="#888" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="268" y1="142" x2="268" y2="244" stroke="#888" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="280" y1="118" x2="264" y2="222" stroke="#888" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- 法向量 n / 倾角 γ -->
  <line x1="245" y1="130" x2="265" y2="90" stroke="#46c" stroke-width="2" marker-end="url(#ud)"/>
  <text x="268" y="92" font-size="12" fill="#46c" font-weight="bold">n（法向）</text>
  <text x="225" y="190" font-size="11.5" fill="#c5a">倾角 γ：dσ=dS·cosγ</text>

  <text x="30" y="322" font-size="10.5" fill="#888">曲面越斜，同一 dσ 对应的 dS 越大；放大倍率=1/cosγ=√(1+z_x²+z_y²)</text>
</svg>
