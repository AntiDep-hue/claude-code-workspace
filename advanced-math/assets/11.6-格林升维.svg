<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" font-family="sans-serif">
  <defs>
    <marker id="ar-g" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2b7"/></marker>
    <marker id="ar-b" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#46c"/></marker>
  </defs>

  <!-- 左:平面 闭曲线围区域 -->
  <text x="140" y="28" font-size="14" font-weight="bold" fill="#444" text-anchor="middle">格林:平面闭曲线 L 围区域 D</text>
  <path d="M60,90 C70,55 200,55 215,100 C235,160 150,210 95,185 C55,165 50,125 60,90 Z"
        fill="#dff3e8" stroke="#2b7" stroke-width="2.5" marker-mid="url(#ar-g)"/>
  <path d="M135,72 l14,-2" stroke="#2b7" stroke-width="2.5" marker-end="url(#ar-g)"/>
  <text x="138" y="135" font-size="15" fill="#2b7" font-weight="bold" text-anchor="middle">D</text>
  <text x="210" y="78" font-size="13" fill="#2b7">L</text>
  <text x="140" y="245" font-size="12" fill="#888" text-anchor="middle">边界 = 曲线(1维)</text>
  <text x="140" y="262" font-size="12" fill="#888" text-anchor="middle">内部 = 平面(2维)→二重积分</text>

  <line x1="280" y1="60" x2="280" y2="240" stroke="#eee" stroke-width="2"/>

  <!-- 右:空间 闭曲面围立体 -->
  <text x="420" y="28" font-size="14" font-weight="bold" fill="#444" text-anchor="middle">高斯:空间闭曲面 Σ 围立体 Ω</text>
  <!-- 椭球体感 -->
  <ellipse cx="420" cy="130" rx="80" ry="60" fill="#dde7fa" stroke="#46c" stroke-width="2.5"/>
  <ellipse cx="420" cy="130" rx="80" ry="20" fill="none" stroke="#46c" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
  <path d="M420,80 C460,82 470,100 470,100" fill="none" stroke="#46c" stroke-width="1" opacity="0.5"/>
  <text x="420" y="136" font-size="15" fill="#46c" font-weight="bold" text-anchor="middle">Ω</text>
  <text x="495" y="100" font-size="13" fill="#46c">Σ</text>
  <!-- 外法向箭头 -->
  <line x1="420" y1="70" x2="420" y2="48" stroke="#46c" stroke-width="2" marker-end="url(#ar-b)"/>
  <line x1="500" y1="130" x2="522" y2="130" stroke="#46c" stroke-width="2" marker-end="url(#ar-b)"/>
  <line x1="420" y1="190" x2="420" y2="212" stroke="#46c" stroke-width="2" marker-end="url(#ar-b)"/>
  <line x1="340" y1="130" x2="318" y2="130" stroke="#46c" stroke-width="2" marker-end="url(#ar-b)"/>
  <text x="420" y="245" font-size="12" fill="#888" text-anchor="middle">边界 = 曲面(2维)</text>
  <text x="420" y="262" font-size="12" fill="#888" text-anchor="middle">内部 = 立体(3维)→三重积分</text>

  <text x="280" y="290" font-size="12.5" fill="#444" text-anchor="middle">同一句话「边界积分 = 内部导数积分」整体升一维</text>
</svg>
