<svg viewBox="0 0 440 350" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="td" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#444"/></marker>
    <marker id="to" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#e6a23c"/></marker>
  </defs>
  <rect x="8" y="6" width="424" height="44" rx="5" fill="#f4f6fb" stroke="#ccd"/>
  <text x="18" y="25" font-size="12.5" fill="#333" font-weight="bold">本图演算（先一后二／投影法）：∭_Ω f dv = ∬_D [ ∫_{z₁(x,y)}^{z₂(x,y)} f dz ] dσ</text>
  <text x="18" y="42" font-size="12.5" fill="#333">先沿 z 穿一根针 → 再在投影区 D 上做二重积分</text>

  <!-- z 轴 -->
  <line x1="120" y1="320" x2="120" y2="70" stroke="#444" stroke-width="1.3" marker-end="url(#td)"/>
  <text x="108" y="82" font-size="12" fill="#444">z</text>
  <!-- x,y 透视轴 -->
  <line x1="120" y1="270" x2="40" y2="320" stroke="#444" stroke-width="1.3" marker-end="url(#td)"/>
  <line x1="120" y1="270" x2="400" y2="245" stroke="#444" stroke-width="1.3" marker-end="url(#td)"/>
  <text x="34" y="335" font-size="12" fill="#444">x</text>
  <text x="392" y="240" font-size="12" fill="#444">y</text>

  <!-- 立体 Ω（曲顶 + 投影底） -->
  <path d="M150,255 L300,243 L250,200 Z" fill="#cfe3f7" stroke="#46c" stroke-width="1.5" opacity="0.6"/>
  <text x="220" y="150" font-size="13" fill="#2b7" font-weight="bold">Ω</text>
  <!-- 上曲面 z2 -->
  <path d="M150,170 Q230,120 320,160" fill="none" stroke="#e77" stroke-width="2"/>
  <text x="318" y="150" font-size="11.5" fill="#e77" font-weight="bold">z=z₂(x,y) 上</text>
  <!-- 下曲面 z1（这里取 z=0 平面上的投影 D） -->
  <polygon points="150,255 300,243 250,200" fill="#cfe3f7" stroke="#46c" stroke-width="1.5"/>
  <text x="195" y="248" font-size="11.5" fill="#46c" font-weight="bold">投影区 D（z₁ 在此）</text>

  <!-- 穿针：竖直线从 z1 到 z2 -->
  <line x1="225" y1="235" x2="225" y2="150" stroke="#888" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="225" y1="232" x2="225" y2="158" stroke="#e6a23c" stroke-width="3" marker-end="url(#to)"/>
  <circle cx="225" cy="234" r="3.5" fill="#46c"/>
  <circle cx="225" cy="155" r="3.5" fill="#e77"/>
  <text x="232" y="205" font-size="11" fill="#e6a23c" font-weight="bold">沿 z 穿针</text>
  <text x="232" y="170" font-size="10.5" fill="#e77">出: z₂</text>
  <text x="232" y="248" font-size="10.5" fill="#46c">入: z₁</text>

  <text x="30" y="345" font-size="10.5" fill="#888">先把 z 积掉（针的上下端），剩下投影区 D 上一个二重积分（再按10.2定限）</text>
</svg>
