<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" font-family="sans-serif">
  <defs>
    <marker id="cv-k" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#444"/></marker>
  </defs>

  <!-- 本图演算框 -->
  <rect x="20" y="8" width="520" height="30" rx="5" fill="#fdf6e3" stroke="#d9b14a" stroke-width="1"/>
  <text x="280" y="22" font-size="11.5" fill="#9a7b1a" text-anchor="middle" font-weight="bold">本图演算的是（收敛/发散定义那行）：</text>
  <text x="280" y="34" font-size="12.5" fill="#7a5d0a" text-anchor="middle" font-weight="bold">级数 ∑uₙ 收敛 ⟺ 部分和 sₙ=u₁+…+uₙ 有极限   ← 跟着一项项加上去看 sₙ 落点</text>

  <text x="280" y="58" font-size="12.5" font-weight="bold" fill="#444" text-anchor="middle">同一动作「逐项累加 sₙ」，两条命运：停住 / 冲顶</text>

  <!-- 左:收敛 -->
  <text x="150" y="80" font-size="12.5" font-weight="bold" fill="#2b7" text-anchor="middle">收敛：sₙ 越加越靠近 s</text>
  <line x1="45" y1="270" x2="270" y2="270" stroke="#444" stroke-width="1.3" marker-end="url(#cv-k)"/>
  <line x1="45" y1="278" x2="45" y2="95" stroke="#444" stroke-width="1.3" marker-end="url(#cv-k)"/>
  <text x="262" y="286" font-size="11" fill="#444">n</text>
  <text x="30" y="104" font-size="11" fill="#444">sₙ</text>
  <!-- 极限线 s -->
  <line x1="45" y1="120" x2="265" y2="120" stroke="#e77" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="232" y="114" font-size="11" fill="#e77" font-weight="bold">和 s=2</text>
  <!-- 折线逐步生长:每段=加一项 uₙ -->
  <polyline points="70,210 100,160 130,140 160,130 190,125 220,122 250,120" fill="none" stroke="#2b7" stroke-width="2"
            stroke-dasharray="300" stroke-dashoffset="300">
    <animate attributeName="stroke-dashoffset" from="300" to="0" dur="2.8s" fill="freeze"/>
  </polyline>
  <g fill="#2b7">
    <circle cx="70" cy="210" r="3.5" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.0s" dur="0.2s" fill="freeze"/></circle>
    <circle cx="100" cy="160" r="3.5" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.45s" dur="0.2s" fill="freeze"/></circle>
    <circle cx="130" cy="140" r="3.5" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.2s" fill="freeze"/></circle>
    <circle cx="160" cy="130" r="3.5" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.35s" dur="0.2s" fill="freeze"/></circle>
    <circle cx="190" cy="125" r="3.5" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.2s" fill="freeze"/></circle>
    <circle cx="220" cy="122" r="3.5" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="2.25s" dur="0.2s" fill="freeze"/></circle>
    <circle cx="250" cy="120" r="3.5" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.2s" fill="freeze"/></circle>
  </g>
  <text x="62" y="224" font-size="10.5" fill="#2b7">s₁</text>
  <text x="150" y="298" font-size="11" fill="#888" text-anchor="middle">1+½+¼+…，每项是前项一半</text>

  <line x1="290" y1="95" x2="290" y2="285" stroke="#eee" stroke-width="2"/>

  <!-- 右:发散 -->
  <text x="420" y="80" font-size="12.5" font-weight="bold" fill="#e44" text-anchor="middle">发散：sₙ 一路冲破顶</text>
  <line x1="315" y1="270" x2="540" y2="270" stroke="#444" stroke-width="1.3" marker-end="url(#cv-k)"/>
  <line x1="315" y1="278" x2="315" y2="95" stroke="#444" stroke-width="1.3" marker-end="url(#cv-k)"/>
  <text x="532" y="286" font-size="11" fill="#444">n</text>
  <text x="300" y="104" font-size="11" fill="#444">sₙ</text>
  <polyline points="340,250 370,222 400,200 430,180 460,160 490,138 520,110" fill="none" stroke="#e44" stroke-width="2"
            stroke-dasharray="240" stroke-dashoffset="240">
    <animate attributeName="stroke-dashoffset" from="240" to="0" dur="2.8s" fill="freeze"/>
  </polyline>
  <g fill="#e44">
    <circle cx="340" cy="250" r="3.5" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.0s" dur="0.2s" fill="freeze"/></circle>
    <circle cx="370" cy="222" r="3.5" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.45s" dur="0.2s" fill="freeze"/></circle>
    <circle cx="400" cy="200" r="3.5" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.2s" fill="freeze"/></circle>
    <circle cx="430" cy="180" r="3.5" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.35s" dur="0.2s" fill="freeze"/></circle>
    <circle cx="460" cy="160" r="3.5" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.2s" fill="freeze"/></circle>
    <circle cx="490" cy="138" r="3.5" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="2.25s" dur="0.2s" fill="freeze"/></circle>
    <circle cx="520" cy="110" r="3.5" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.2s" fill="freeze"/></circle>
  </g>
  <text x="420" y="298" font-size="11" fill="#888" text-anchor="middle">1+½+⅓+…（调和），项减得太慢</text>

  <text x="280" y="316" font-size="12" fill="#444" text-anchor="middle">关键不在「项是否趋于0」，而在累加的 sₙ 有没有极限</text>
</svg>
