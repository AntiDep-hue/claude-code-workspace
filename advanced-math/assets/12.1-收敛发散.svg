<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 280" font-family="sans-serif">
  <defs>
    <marker id="ax" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#444"/></marker>
  </defs>
  <text x="280" y="24" font-size="14" font-weight="bold" fill="#444" text-anchor="middle">同样"无穷个数相加",命运两条路</text>

  <!-- 左:收敛 -->
  <text x="150" y="50" font-size="13" font-weight="bold" fill="#2b7" text-anchor="middle">收敛:s_n 停在某个数</text>
  <line x1="45" y1="220" x2="270" y2="220" stroke="#444" stroke-width="1.3" marker-end="url(#ax)"/>
  <line x1="45" y1="228" x2="45" y2="70" stroke="#444" stroke-width="1.3" marker-end="url(#ax)"/>
  <line x1="45" y1="100" x2="265" y2="100" stroke="#e77" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="232" y="94" font-size="11" fill="#e77">s = 2</text>
  <polyline points="70,170 100,128 130,112 160,105 190,102 220,101 250,100" fill="none" stroke="#2b7" stroke-width="2"/>
  <g fill="#2b7"><circle cx="70" cy="170" r="3.5"/><circle cx="100" cy="128" r="3.5"/><circle cx="130" cy="112" r="3.5"/><circle cx="160" cy="105" r="3.5"/><circle cx="190" cy="102" r="3.5"/><circle cx="220" cy="101" r="3.5"/><circle cx="250" cy="100" r="3.5"/></g>
  <text x="150" y="250" font-size="11.5" fill="#888" text-anchor="middle">1+½+¼+… → 2</text>

  <line x1="290" y1="60" x2="290" y2="240" stroke="#eee" stroke-width="2"/>

  <!-- 右:发散 -->
  <text x="420" y="50" font-size="13" font-weight="bold" fill="#e77" text-anchor="middle">发散:s_n 冲向无穷</text>
  <line x1="315" y1="220" x2="540" y2="220" stroke="#444" stroke-width="1.3" marker-end="url(#ax)"/>
  <line x1="315" y1="228" x2="315" y2="70" stroke="#444" stroke-width="1.3" marker-end="url(#ax)"/>
  <polyline points="340,205 370,180 400,160 430,142 460,124 490,104 520,82" fill="none" stroke="#e77" stroke-width="2"/>
  <g fill="#e77"><circle cx="340" cy="205" r="3.5"/><circle cx="370" cy="180" r="3.5"/><circle cx="400" cy="160" r="3.5"/><circle cx="430" cy="142" r="3.5"/><circle cx="460" cy="124" r="3.5"/><circle cx="490" cy="104" r="3.5"/><circle cx="520" cy="82" r="3.5"/></g>
  <text x="420" y="250" font-size="11.5" fill="#888" text-anchor="middle">1+½+⅓+… → ∞(调和)</text>

  <text x="280" y="274" font-size="12" fill="#444" text-anchor="middle">全看部分和数列 {s_n} 有没有极限</text>
</svg>
