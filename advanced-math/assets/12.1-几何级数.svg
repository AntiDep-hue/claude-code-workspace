<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 270" font-family="sans-serif">
  <text x="20" y="24" font-size="14" font-weight="bold" fill="#444">几何级数 ∑aqⁿ：公比 q 决定生死</text>

  <!-- |q|<1 收敛:线段对折逼近 -->
  <text x="20" y="58" font-size="12.5" fill="#2b7" font-weight="bold">|q|&lt;1：每步缩小，总长有限 → 收敛 a/(1-q)</text>
  <line x1="30" y1="78" x2="320" y2="78" stroke="#ccc" stroke-width="1"/>
  <g fill="#2b7" fill-opacity="0.25" stroke="#2b7" stroke-width="1">
    <rect x="30" y="68" width="145" height="20"/>
    <rect x="175" y="68" width="72" height="20"/>
    <rect x="247" y="68" width="36" height="20"/>
    <rect x="283" y="68" width="18" height="20"/>
    <rect x="301" y="68" width="9" height="20"/>
  </g>
  <text x="90" y="103" font-size="10" fill="#2b7">a</text>
  <text x="200" y="103" font-size="10" fill="#2b7">aq</text>
  <text x="252" y="103" font-size="10" fill="#2b7">aq²…</text>
  <text x="325" y="82" font-size="11" fill="#2b7">→ 收敛上限</text>

  <!-- |q|≥1 发散:越加越大 -->
  <text x="20" y="148" font-size="12.5" fill="#e77" font-weight="bold">|q|≥1：每项不减，越加越大 → 发散</text>
  <line x1="30" y1="168" x2="430" y2="168" stroke="#ccc" stroke-width="1"/>
  <g fill="#e77" fill-opacity="0.25" stroke="#e77" stroke-width="1">
    <rect x="30" y="158" width="40" height="20"/>
    <rect x="70" y="158" width="55" height="20"/>
    <rect x="125" y="158" width="75" height="20"/>
    <rect x="200" y="158" width="100" height="20"/>
    <rect x="300" y="158" width="130" height="20"/>
  </g>
  <text x="320" y="193" font-size="11" fill="#e77">越加越多 → ∞</text>

  <text x="20" y="232" font-size="12.5" fill="#444">|q|&lt;1 收敛于 a/(1-q)；|q|≥1 发散。这是判敛的"标尺级数"之一</text>
  <text x="20" y="252" font-size="11.5" fill="#888">另一把标尺：p-级数 ∑1/nᵖ —— p&gt;1 收敛，p≤1 发散</text>
</svg>
