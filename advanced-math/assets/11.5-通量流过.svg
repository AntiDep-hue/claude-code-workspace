<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 270" font-family="sans-serif">
  <text x="20" y="26" font-size="14" font-weight="bold" fill="#444">流量：单位时间内流过曲面 Σ 的水量</text>

  <defs>
    <marker id="ar-b" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#46c"/>
    </marker>
    <marker id="ar-r" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#e77"/>
    </marker>
  </defs>

  <!-- 倾斜曲面 Σ (平行四边形) -->
  <polygon points="150,70 250,55 290,200 190,215" fill="#2b7" fill-opacity="0.18" stroke="#2b7" stroke-width="2"/>
  <text x="255" y="120" font-size="13" fill="#2b7" font-weight="bold">Σ</text>

  <!-- 流速场 v 的箭头(一排,从左往右穿过曲面) -->
  <g stroke="#46c" stroke-width="2">
    <line x1="60" y1="95" x2="135" y2="95" marker-end="url(#ar-b)"/>
    <line x1="60" y1="135" x2="135" y2="135" marker-end="url(#ar-b)"/>
    <line x1="60" y1="175" x2="135" y2="175" marker-end="url(#ar-b)"/>
  </g>
  <text x="60" y="80" font-size="12" fill="#46c">流速 v</text>
  <!-- 穿出后继续 -->
  <g stroke="#46c" stroke-width="2" opacity="0.5">
    <line x1="270" y1="100" x2="330" y2="100" marker-end="url(#ar-b)"/>
    <line x1="285" y1="140" x2="345" y2="140" marker-end="url(#ar-b)"/>
    <line x1="300" y1="180" x2="360" y2="180" marker-end="url(#ar-b)"/>
  </g>

  <!-- 法向量 n -->
  <line x1="220" y1="135" x2="285" y2="118" stroke="#e77" stroke-width="2.5" marker-end="url(#ar-r)"/>
  <text x="289" y="116" font-size="13" fill="#e77" font-weight="bold">n</text>

  <!-- 夹角说明 -->
  <text x="20" y="245" font-size="12.5" fill="#444">只有"垂直穿过"的分量算数：流量 = v 在 n 方向的投影 × 面积</text>
  <text x="20" y="263" font-size="12.5" fill="#888">即 Φ = ∬ v·n dS —— 顺着 n 流为正，逆着为负</text>
</svg>
