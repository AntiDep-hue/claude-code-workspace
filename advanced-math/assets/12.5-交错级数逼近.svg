<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 340" font-family="sans-serif">
  <defs>
    <marker id="a55" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#444"/></marker>
  </defs>
  <!-- 本图演算框 -->
  <rect x="10" y="8" width="440" height="40" rx="5" fill="#f3f6fb" stroke="#cdd8ea"/>
  <text x="20" y="25" font-size="12" fill="#445">本图演算　例3 部分和 sₙ 在真值两侧交替逼近：</text>
  <text x="20" y="40" font-size="12.5" fill="#445">s₁=x,　s₂=x−x³/3!,　误差 ≤ 首个丢弃项 |x⁵/5!|</text>

  <!-- 数轴 -->
  <line x1="40" y1="220" x2="430" y2="220" stroke="#444" stroke-width="1.5" marker-end="url(#a55)"/>
  <text x="425" y="240" font-size="12" fill="#888">sin x 的部分和</text>

  <!-- 真值竖线 -->
  <line x1="300" y1="80" x2="300" y2="250" stroke="#46c" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="282" y="270" font-size="13" fill="#46c" font-weight="bold">真值 sin x</text>

  <!-- s1 (偏大, 右侧) -->
  <circle cx="360" cy="220" r="5" fill="#e77"/>
  <text x="350" y="210" font-size="13" fill="#e77" font-weight="bold">s₁=x</text>
  <text x="320" y="150" font-size="11" fill="#888">①只取 x：偏大</text>
  <line x1="360" y1="215" x2="360" y2="160" stroke="#e77" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- s2 (偏小, 左侧) -->
  <circle cx="262" cy="220" r="5" fill="#2b7"/>
  <text x="232" y="210" font-size="13" fill="#2b7" font-weight="bold">s₂=x−x³/3!</text>
  <text x="170" y="180" font-size="11" fill="#888">②减 x³/3!：偏小</text>
  <line x1="262" y1="215" x2="262" y2="185" stroke="#2b7" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- s3 (又偏大一点, 更近) -->
  <circle cx="316" cy="220" r="4" fill="#c5a"/>
  <text x="312" y="298" font-size="12" fill="#c5a" font-weight="bold">s₃</text>
  <line x1="316" y1="225" x2="316" y2="288" stroke="#c5a" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="330" y="298" font-size="11" fill="#888">③加 x⁵/5!：更贴近</text>

  <!-- 误差区间标注 s2->真值 -->
  <path d="M262,128 Q281,116 300,128" fill="none" stroke="#999" stroke-width="1"/>
  <text x="248" y="112" font-size="11" fill="#666">|误差| &lt; 下一项</text>

  <!-- 动画: 脉冲提示真值 -->
  <circle cx="300" cy="220" r="5" fill="none" stroke="#46c" stroke-width="2">
    <animate attributeName="r" from="5" to="15" dur="1.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="1" to="0" dur="1.6s" repeatCount="indefinite"/>
  </circle>

  <text x="40" y="325" font-size="11" fill="#888">交替落在真值两侧、步步逼近 —— 这就是"误差 ≤ 首个丢弃项"的来源</text>
</svg>
