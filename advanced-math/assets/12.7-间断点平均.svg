<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 320" font-family="sans-serif">
  <!-- 本图演算框 -->
  <rect x="8" y="6" width="454" height="40" rx="5" fill="#f3f6fb" stroke="#cdd8ea"/>
  <text x="18" y="23" font-size="12" fill="#445">本图演算　例1 方波在间断点 x=0 处：</text>
  <text x="18" y="38" font-size="12" fill="#445">f(0⁻)=−1, f(0⁺)=+1 → 级数收敛到 (−1+1)/2 = 0</text>

  <!-- 坐标轴 原点(235,170) -->
  <line x1="40" y1="170" x2="440" y2="170" stroke="#444" stroke-width="1.3"/>
  <line x1="235" y1="300" x2="235" y2="70" stroke="#444" stroke-width="1.3"/>
  <text x="430" y="188" font-size="11" fill="#888">x</text>
  <text x="244" y="80" font-size="11" fill="#888">y</text>
  <text x="235" y="118" font-size="10" fill="#888">1</text>
  <text x="222" y="228" font-size="10" fill="#888">−1</text>

  <!-- 方波: 左 -1, 右 +1 -->
  <line x1="100" y1="220" x2="235" y2="220" stroke="#e77" stroke-width="3"/>
  <line x1="235" y1="120" x2="370" y2="120" stroke="#e77" stroke-width="3"/>
  <text x="140" y="240" font-size="12" fill="#e77">f=−1</text>
  <text x="290" y="112" font-size="12" fill="#e77">f=+1</text>

  <!-- 跳变虚线 -->
  <line x1="235" y1="120" x2="235" y2="220" stroke="#e77" stroke-width="1.3" stroke-dasharray="4 3"/>
  <!-- 空心端点 -->
  <circle cx="235" cy="220" r="4" fill="white" stroke="#e77" stroke-width="1.5"/>
  <circle cx="235" cy="120" r="4" fill="white" stroke="#e77" stroke-width="1.5"/>

  <!-- 收敛点: 跳变正中 (235,170) -->
  <circle cx="235" cy="170" r="6" fill="#46c"/>
  <text x="248" y="166" font-size="12.5" fill="#46c" font-weight="bold">级数值 = 0</text>
  <text x="248" y="182" font-size="10.5" fill="#888">(跳变正中点)</text>

  <!-- 标注左右极限 -->
  <path d="M200,220 Q180,195 200,170" fill="none" stroke="#999" stroke-width="1"/>
  <path d="M270,120 Q290,145 270,170" fill="none" stroke="#999" stroke-width="1"/>
  <text x="150" y="195" font-size="11" fill="#666">f(0⁻)</text>
  <text x="295" y="150" font-size="11" fill="#666">f(0⁺)</text>

  <!-- 脉冲提示中点 -->
  <circle cx="235" cy="170" r="6" fill="none" stroke="#46c" stroke-width="2">
    <animate attributeName="r" from="6" to="16" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="1" to="0" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <text x="40" y="305" font-size="11" fill="#888">狄利克雷定理：间断点处级数不偏不倚，落在左右极限的算术平均</text>
</svg>
