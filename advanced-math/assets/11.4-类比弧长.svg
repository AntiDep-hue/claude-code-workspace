<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 250" font-family="sans-serif">
  <!-- 左面板:第一型曲线积分 -->
  <text x="35" y="28" font-size="14" font-weight="bold" fill="#444">曲线上:∫_L f(x,y) ds</text>
  <!-- 基线 -->
  <line x1="30" y1="210" x2="270" y2="210" stroke="#ccc" stroke-width="1"/>
  <!-- 曲线 -->
  <path d="M45,165 C 95,115 140,205 185,150 S 245,108 258,118" fill="none" stroke="#444" stroke-width="2"/>
  <!-- 分段点竖虚线 -->
  <g stroke="#bbb" stroke-width="1" stroke-dasharray="3 3">
    <line x1="75" y1="139" x2="75" y2="210"/>
    <line x1="120" y1="168" x2="120" y2="210"/>
    <line x1="165" y1="166" x2="165" y2="210"/>
    <line x1="210" y1="128" x2="210" y2="210"/>
  </g>
  <!-- 高亮一小段 Δsᵢ -->
  <path d="M120,168 C 140,182 152,178 165,166" fill="none" stroke="#2b7" stroke-width="3.5"/>
  <circle cx="143" cy="176" r="3.5" fill="#2b7"/>
  <text x="128" y="200" font-size="12" fill="#2b7" font-weight="bold">Δsᵢ</text>
  <text x="150" y="172" font-size="11" fill="#2b7">(ξᵢ,ηᵢ)</text>
  <text x="40" y="232" font-size="11" fill="#888">线分小段，密度×弧长，累加</text>

  <!-- 分隔 -->
  <line x1="285" y1="20" x2="285" y2="235" stroke="#eee" stroke-width="1"/>

  <!-- 右面板:第一型曲面积分 -->
  <text x="300" y="28" font-size="14" font-weight="bold" fill="#444">曲面上:∬_Σ f(x,y,z) dS</text>
  <!-- 曲面网格 P(u,v)=(325+50u+20v, 140-11u+18v) -->
  <g stroke="#888" stroke-width="1" fill="none">
    <!-- 横线 v=0..3 -->
    <polyline points="325,140 375,129 425,118 475,107"/>
    <polyline points="345,158 395,147 445,136 495,125"/>
    <polyline points="365,176 415,165 465,154 515,143"/>
    <polyline points="385,194 435,183 485,172 535,161"/>
    <!-- 竖线 u=0..3 -->
    <polyline points="325,140 345,158 365,176 385,194"/>
    <polyline points="375,129 395,147 415,165 435,183"/>
    <polyline points="425,118 445,136 465,154 485,172"/>
    <polyline points="475,107 495,125 515,143 535,161"/>
  </g>
  <!-- 高亮一小片 ΔSᵢ -->
  <polygon points="395,147 445,136 465,154 415,165" fill="#2b7" fill-opacity="0.28" stroke="#2b7" stroke-width="2"/>
  <circle cx="430" cy="150" r="3.5" fill="#2b7"/>
  <text x="437" y="148" font-size="11" fill="#2b7">(ξᵢ,ηᵢ,ζᵢ)</text>
  <text x="400" y="135" font-size="12" fill="#2b7" font-weight="bold">ΔSᵢ</text>
  <text x="320" y="225" font-size="11" fill="#888">面分小片，密度×面积，累加</text>
</svg>
