<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 340" font-family="sans-serif">
  <defs>
    <marker id="dv-r" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#e44"/></marker>
    <marker id="dv-g" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#1a9a5a"/></marker>
    <marker id="dv-b" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#36c"/></marker>
    <marker id="dv-k" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#999"/></marker>
  </defs>

  <!-- жң¬еӣҫжј”з®—жЎҶ:зӮ№еҗҚеҜ№еә”е…¬ејҸиЎҢ -->
  <rect x="20" y="8" width="500" height="30" rx="5" fill="#fdf6e3" stroke="#d9b14a" stroke-width="1"/>
  <text x="270" y="22" font-size="11.5" fill="#9a7b1a" text-anchor="middle" font-weight="bold">жң¬еӣҫжј”з®—зҡ„жҳҜпјҲж•ЈеәҰе®ҡд№үйӮЈиЎҢпјүпјҡ</text>
  <text x="270" y="34" font-size="12.5" fill="#7a5d0a" text-anchor="middle" font-weight="bold">div A = вҲӮP/вҲӮx + вҲӮQ/вҲӮy + вҲӮR/вҲӮz   вҶҗ дёҖзӮ№еӨ„еҸ–е°Ҹз«Ӣж–№дҪ“пјҢе…ӯйқўгҖҢеҮҖжөҒеҮәгҖҚйҖҗж–№еҗ‘зҙҜеҠ </text>

  <text x="170" y="58" font-size="12.5" font-weight="bold" fill="#444" text-anchor="middle">еңЁдёҖзӮ№еҸ–е°Ҹз«Ӣж–№дҪ“ dVпјҢзңӢжҜҸеҜ№йқўпјҡжөҒеҮә вҲ’ жөҒе…Ҙ</text>

  <!-- зӯүи·қе°Ҹз«Ӣж–№дҪ“ -->
  <!-- еүҚйқў -->
  <polygon points="150,185 230,185 230,265 150,265" fill="#f4f7fb" stroke="#888" stroke-width="1.4"/>
  <!-- йЎ¶йқў -->
  <polygon points="150,185 195,155 275,155 230,185" fill="#eef2f8" stroke="#888" stroke-width="1.4"/>
  <!-- еҸійқў -->
  <polygon points="230,185 275,155 275,235 230,265" fill="#e8edf5" stroke="#888" stroke-width="1.4"/>
  <text x="190" y="232" font-size="12" fill="#888" text-anchor="middle">dV</text>

  <!-- x ж–№еҗ‘(зәў):е·ҰйқўжөҒе…Ҙ < еҸійқўжөҒеҮә -->
  <line x1="105" y1="225" x2="146" y2="225" stroke="#e44" stroke-width="2" marker-end="url(#dv-r)" opacity="0.5"/>
  <text x="100" y="229" font-size="10.5" fill="#e44" text-anchor="end">P жөҒе…Ҙ</text>
  <line x1="278" y1="198" x2="278" y2="198" stroke="#e44" stroke-width="3" marker-end="url(#dv-r)">
    <animate attributeName="x2" from="278" to="322" dur="0.8s" begin="0.2s" fill="freeze"/>
  </line>
  <text x="284" y="190" font-size="10.5" fill="#e44">P жөҒеҮә(жӣҙеӨ§)</text>

  <!-- z ж–№еҗ‘(и“қ):еә•йқўжөҒе…Ҙ < йЎ¶йқўжөҒеҮә -->
  <line x1="175" y1="300" x2="175" y2="268" stroke="#36c" stroke-width="2" marker-end="url(#dv-b)" opacity="0.5"/>
  <text x="175" y="316" font-size="10.5" fill="#36c" text-anchor="middle">R жөҒе…Ҙ</text>
  <line x1="212" y1="153" x2="212" y2="153" stroke="#36c" stroke-width="3" marker-end="url(#dv-b)">
    <animate attributeName="y2" from="153" to="110" dur="0.8s" begin="1.0s" fill="freeze"/>
  </line>
  <text x="220" y="120" font-size="10.5" fill="#36c">R жөҒеҮә(жӣҙеӨ§)</text>

  <!-- y ж–№еҗ‘(з»ҝ,ж·ұеәҰ):еүҚйқўжөҒе…Ҙ < еҗҺйқўжөҒеҮә -->
  <line x1="178" y1="285" x2="200" y2="263" stroke="#1a9a5a" stroke-width="2" marker-end="url(#dv-g)" opacity="0.5"/>
  <text x="150" y="290" font-size="10.5" fill="#1a9a5a">Q жөҒе…Ҙ</text>
  <line x1="252" y1="150" x2="252" y2="150" stroke="#1a9a5a" stroke-width="3" marker-end="url(#dv-g)">
    <animate attributeName="x2" from="252" to="284" dur="0.8s" begin="1.8s" fill="freeze"/>
    <animate attributeName="y2" from="150" to="126" dur="0.8s" begin="1.8s" fill="freeze"/>
  </line>
  <text x="288" y="150" font-size="10.5" fill="#1a9a5a">Q жөҒеҮә(жӣҙеӨ§)</text>

  <!-- еҸідҫ§зҙҜеҠ йқўжқҝ:дёүйЎ№дҫқж¬ЎеҮәзҺ° -->
  <line x1="345" y1="70" x2="345" y2="300" stroke="#eee" stroke-width="2"/>
  <text x="440" y="92" font-size="12" fill="#444" text-anchor="middle" font-weight="bold">еҮҖжөҒеҮә = дёүж–№еҗ‘зҙҜеҠ </text>

  <text x="362" y="130" font-size="13" fill="#e44" font-weight="bold" opacity="0">пјҲеҸівҲ’е·Ұпјү= вҲӮP/вҲӮx В· dV
    <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.4s" fill="freeze"/>
  </text>
  <text x="362" y="162" font-size="13" fill="#1a9a5a" font-weight="bold" opacity="0">пјҲеҗҺвҲ’еүҚпјү= вҲӮQ/вҲӮy В· dV
    <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.4s" fill="freeze"/>
  </text>
  <text x="362" y="194" font-size="13" fill="#36c" font-weight="bold" opacity="0">пјҲйЎ¶вҲ’еә•пјү= вҲӮR/вҲӮz В· dV
    <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.4s" fill="freeze"/>
  </text>

  <line x1="362" y1="208" x2="520" y2="208" stroke="#999" stroke-width="1" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.4s" fill="freeze"/>
  </line>
  <text x="362" y="232" font-size="12.5" fill="#444" opacity="0">е…ӯйқўеҮҖжөҒеҮәжҖ»йҮҸ = (вҲӮP/вҲӮx+вҲӮQ/вҲӮy+вҲӮR/вҲӮz)В·dV
    <animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.4s" fill="freeze"/>
  </text>
  <text x="362" y="262" font-size="13" fill="#444" font-weight="bold" opacity="0">еҶҚ Г·dVпјҲжҜҸеҚ•дҪҚдҪ“з§Ҝзҡ„еҶ’ж°ҙзҺҮпјүпјҡ
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.4s" fill="freeze"/>
  </text>
  <text x="362" y="286" font-size="13.5" fill="#444" font-weight="bold" opacity="0">div A = вҲӮP/вҲӮx+вҲӮQ/вҲӮy+вҲӮR/вҲӮz
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.4s" fill="freeze"/>
  </text>
</svg>
