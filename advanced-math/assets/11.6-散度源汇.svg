<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 240" font-family="sans-serif">
  <defs>
    <marker id="ar-r" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#e77"/></marker>
    <marker id="ar-b" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#46c"/></marker>
  </defs>
  <text x="280" y="24" font-size="14" font-weight="bold" fill="#444" text-anchor="middle">散度 = 每点的「冒水强度」(标量,逐点定义)</text>

  <!-- 源 div>0 -->
  <text x="95" y="58" font-size="13" font-weight="bold" fill="#e77" text-anchor="middle">div A &gt; 0:源</text>
  <circle cx="95" cy="130" r="5" fill="#e77"/>
  <g stroke="#e77" stroke-width="2">
    <line x1="95" y1="125" x2="95" y2="88" marker-end="url(#ar-r)"/>
    <line x1="95" y1="135" x2="95" y2="172" marker-end="url(#ar-r)"/>
    <line x1="90" y1="130" x2="53" y2="130" marker-end="url(#ar-r)"/>
    <line x1="100" y1="130" x2="137" y2="130" marker-end="url(#ar-r)"/>
    <line x1="91" y1="126" x2="66" y2="101" marker-end="url(#ar-r)"/>
    <line x1="99" y1="126" x2="124" y2="101" marker-end="url(#ar-r)"/>
    <line x1="91" y1="134" x2="66" y2="159" marker-end="url(#ar-r)"/>
    <line x1="99" y1="134" x2="124" y2="159" marker-end="url(#ar-r)"/>
  </g>
  <text x="95" y="200" font-size="12" fill="#888" text-anchor="middle">水往外冒(水龙头)</text>

  <!-- 汇 div<0 -->
  <text x="280" y="58" font-size="13" font-weight="bold" fill="#46c" text-anchor="middle">div A &lt; 0:汇</text>
  <circle cx="280" cy="130" r="5" fill="#46c"/>
  <g stroke="#46c" stroke-width="2">
    <line x1="280" y1="88" x2="280" y2="120" marker-end="url(#ar-b)"/>
    <line x1="280" y1="172" x2="280" y2="140" marker-end="url(#ar-b)"/>
    <line x1="238" y1="130" x2="270" y2="130" marker-end="url(#ar-b)"/>
    <line x1="322" y1="130" x2="290" y2="130" marker-end="url(#ar-b)"/>
    <line x1="251" y1="101" x2="273" y2="123" marker-end="url(#ar-b)"/>
    <line x1="309" y1="101" x2="287" y2="123" marker-end="url(#ar-b)"/>
    <line x1="251" y1="159" x2="273" y2="137" marker-end="url(#ar-b)"/>
    <line x1="309" y1="159" x2="287" y2="137" marker-end="url(#ar-b)"/>
  </g>
  <text x="280" y="200" font-size="12" fill="#888" text-anchor="middle">水往里汇(下水口)</text>

  <!-- 无源 div=0 -->
  <text x="465" y="58" font-size="13" font-weight="bold" fill="#444" text-anchor="middle">div A = 0</text>
  <circle cx="465" cy="130" r="5" fill="#888"/>
  <g stroke="#888" stroke-width="2">
    <line x1="423" y1="100" x2="450" y2="115" marker-end="url(#ar-b)"/>
    <line x1="465" y1="115" x2="465" y2="115"/>
    <line x1="450" y1="115" x2="480" y2="115"/>
    <line x1="480" y1="115" x2="507" y2="100" marker-end="url(#ar-b)"/>
    <line x1="423" y1="160" x2="450" y2="145" marker-end="url(#ar-b)"/>
    <line x1="450" y1="145" x2="480" y2="145"/>
    <line x1="480" y1="145" x2="507" y2="160" marker-end="url(#ar-b)"/>
  </g>
  <text x="465" y="200" font-size="12" fill="#888" text-anchor="middle">流进=流出,不增不减</text>
  <text x="280" y="228" font-size="12" fill="#444" text-anchor="middle">div A = ∂P/∂x + ∂Q/∂y + ∂R/∂z = ∇·A</text>
</svg>
