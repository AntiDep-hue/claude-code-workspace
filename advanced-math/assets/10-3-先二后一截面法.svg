<svg viewBox="0 0 440 350" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="sd" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#444"/></marker>
  </defs>
  <rect x="8" y="6" width="424" height="44" rx="5" fill="#f4f6fb" stroke="#ccd"/>
  <text x="18" y="25" font-size="12.5" fill="#333" font-weight="bold">本图演算（先二后一／截面法）：∭_Ω f dv = ∫_{c₁}^{c₂} [ ∬_{D_z} f dσ ] dz</text>
  <text x="18" y="42" font-size="12.5" fill="#333">在高度 z 处横切一刀，得截面 D_z；先积这一片，再沿 z 累加</text>

  <!-- z 轴 -->
  <line x1="80" y1="320" x2="80" y2="70" stroke="#444" stroke-width="1.3" marker-end="url(#sd)"/>
  <text x="68" y="82" font-size="12" fill="#444">z</text>

  <!-- 椭球轮廓 -->
  <ellipse cx="230" cy="195" rx="130" ry="105" fill="#eef4ff" stroke="#46c" stroke-width="1.8"/>
  <text x="330" y="130" font-size="13" fill="#2b7" font-weight="bold">Ω</text>

  <!-- 高度 z 处的截面 D_z（椭圆盘） -->
  <ellipse cx="230" cy="160" rx="105" ry="22" fill="#ffe0b2" stroke="#e6a23c" stroke-width="2"/>
  <text x="195" y="164" font-size="12" fill="#e6a23c" font-weight="bold">截面 D_z</text>

  <!-- z 高度标注 -->
  <line x1="80" y1="160" x2="125" y2="160" stroke="#888" stroke-width="1" stroke-dasharray="3 3"/>
  <circle cx="80" cy="160" r="3" fill="#e77"/>
  <text x="56" y="150" font-size="12" fill="#e77" font-weight="bold">z</text>

  <!-- 上下端 c1,c2 -->
  <line x1="68" y1="90" x2="92" y2="90" stroke="#c5a" stroke-width="2"/>
  <line x1="68" y1="300" x2="92" y2="300" stroke="#c5a" stroke-width="2"/>
  <text x="48" y="94" font-size="12" fill="#c5a" font-weight="bold">c₂</text>
  <text x="48" y="304" font-size="12" fill="#c5a" font-weight="bold">c₁</text>

  <!-- 截面随 z 滑动动画提示 -->
  <ellipse cx="230" cy="160" rx="105" ry="22" fill="none" stroke="#e6a23c" stroke-width="1.5" opacity="0.5">
    <animate attributeName="cy" values="90;300;90" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="8;130;8" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="2;27;2" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <text x="30" y="338" font-size="10.5" fill="#888">截面随 z 上下滑、大小在变；每片先做二重积分(或直接用面积)，再 ∫dz 累加</text>
</svg>
