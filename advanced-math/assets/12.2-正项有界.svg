<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 270" font-family="sans-serif">
  <defs>
    <marker id="ax" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#444"/></marker>
  </defs>
  <text x="230" y="24" font-size="14" font-weight="bold" fill="#444" text-anchor="middle">正项级数:s_n 只增不减,有上界就停得住</text>

  <line x1="50" y1="220" x2="430" y2="220" stroke="#444" stroke-width="1.3" marker-end="url(#ax)"/>
  <line x1="50" y1="228" x2="50" y2="55" stroke="#444" stroke-width="1.3" marker-end="url(#ax)"/>
  <text x="435" y="224" font-size="12" fill="#444">n</text>
  <text x="34" y="62" font-size="12" fill="#444">s_n</text>

  <!-- 上界线 M -->
  <line x1="50" y1="90" x2="420" y2="90" stroke="#e77" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="388" y="84" font-size="12" fill="#e77" font-weight="bold">上界 M</text>

  <!-- 单调递增阶梯,逼近上界下方 -->
  <polyline points="80,200 120,160 160,135 200,120 240,110 280,104 320,100 360,98 400,97"
            fill="none" stroke="#2b7" stroke-width="2"/>
  <g fill="#2b7"><circle cx="80" cy="200" r="3.5"/><circle cx="120" cy="160" r="3.5"/><circle cx="160" cy="135" r="3.5"/><circle cx="200" cy="120" r="3.5"/><circle cx="240" cy="110" r="3.5"/><circle cx="280" cy="104" r="3.5"/><circle cx="320" cy="100" r="3.5"/><circle cx="360" cy="98" r="3.5"/><circle cx="400" cy="97" r="3.5"/></g>
  <!-- 单调递增标注 -->
  <path d="M120,160 l0,0" />
  <text x="150" y="180" font-size="11" fill="#2b7">每加一项只上升(uₙ≥0)</text>

  <text x="230" y="250" font-size="12.5" fill="#444" text-anchor="middle">单调递增 + 有上界 ⟹ 收敛(否则冲破任何界 → 发散)</text>
</svg>
