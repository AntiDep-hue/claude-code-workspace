<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 290" font-family="sans-serif">
  <text x="20" y="24" font-size="14" font-weight="bold" fill="#444">交错级数（莱布尼茨）：左右横跳，步子越来越小</text>
  <defs>
    <marker id="lx" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#444"/></marker>
  </defs>

  <line x1="40" y1="160" x2="430" y2="160" stroke="#444" stroke-width="1.5" marker-end="url(#lx)"/>
  <text x="60" y="178" font-size="11" fill="#444">0</text>
  <line x1="65" y1="153" x2="65" y2="167" stroke="#444" stroke-width="1"/>

  <line x1="255" y1="120" x2="255" y2="200" stroke="#e77" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="248" y="115" font-size="12" fill="#e77" font-weight="bold">和 s</text>

  <!-- 静态跳跃弧线(完整可读) -->
  <g fill="none" stroke="#46c" stroke-width="1.8">
    <path d="M65,160 Q200,70 360,160" marker-end="url(#lx)"/>
    <path d="M360,160 Q300,95 175,160" marker-end="url(#lx)"/>
    <path d="M175,160 Q230,108 305,160" marker-end="url(#lx)"/>
    <path d="M305,160 Q265,120 225,160" marker-end="url(#lx)"/>
  </g>
  <g fill="#46c">
    <circle cx="360" cy="160" r="4"/><circle cx="175" cy="160" r="4"/>
    <circle cx="305" cy="160" r="4"/><circle cx="225" cy="160" r="4"/>
  </g>
  <text x="352" y="222" font-size="11" fill="#46c">s₁</text>
  <text x="167" y="222" font-size="11" fill="#46c">s₂</text>
  <text x="298" y="148" font-size="11" fill="#46c">s₃</text>
  <text x="216" y="148" font-size="11" fill="#46c">s₄</text>

  <!-- 动点:沿四段跳跃路径横跳,越夹越紧 -->
  <circle r="6" fill="#e77">
    <animateMotion dur="3.2s" fill="freeze"
      path="M65,160 Q200,70 360,160 Q300,95 175,160 Q230,108 305,160 Q265,120 225,160"/>
  </circle>

  <text x="20" y="258" font-size="12.5" fill="#444">两个条件：① uₙ 单调递减（步子越来越小）② lim uₙ=0（步子归零）</text>
  <text x="20" y="278" font-size="11.5" fill="#888">满足则收敛，和 s≤u₁，余项 |rₙ|≤uₙ₊₁。例：1−½+⅓−¼+… 收敛</text>
</svg>
