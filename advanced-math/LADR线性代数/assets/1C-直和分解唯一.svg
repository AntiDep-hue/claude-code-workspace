<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" font-family="sans-serif">
  <defs>
    <marker id="ar-g2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2b7"/>
    </marker>
    <marker id="ar-b2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#46c"/>
    </marker>
    <marker id="ar-r2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#e77"/>
    </marker>
  </defs>

  <!-- ===== 左:直和 U⊕W,分解唯一 ===== -->
  <text x="150" y="28" font-size="14" font-weight="bold" fill="#2b7" text-anchor="middle">U ⊕ W:每个 v 只有一种拆法</text>
  <!-- 原点 (150,185), u=50 -->
  <line x1="40" y1="185" x2="270" y2="185" stroke="#2b7" stroke-width="2"/>
  <text x="252" y="178" font-size="13" fill="#2b7" font-weight="bold">U</text>
  <line x1="150" y1="290" x2="150" y2="70" stroke="#46c" stroke-width="2"/>
  <text x="158" y="80" font-size="13" fill="#46c" font-weight="bold">W</text>
  <!-- 目标点 v=(2,1.6) -> (250,105) -->
  <circle cx="250" cy="105" r="4.5" fill="#444"/>
  <text x="256" y="101" font-size="13" fill="#444" font-weight="bold">v</text>
  <!-- 唯一分解:沿 U 到 (250,185) 再沿 W 上去 -->
  <line x1="150" y1="185" x2="244" y2="185" stroke="#2b7" stroke-width="2.5" marker-end="url(#ar-g2)"/>
  <line x1="250" y1="185" x2="250" y2="112" stroke="#46c" stroke-width="2.5" marker-end="url(#ar-b2)"/>
  <line x1="150" y1="185" x2="250" y2="105" stroke="#888" stroke-width="1" stroke-dasharray="4 3"/>
  <circle cx="150" cy="185" r="4" fill="#444"/>
  <text x="150" y="318" font-size="11" fill="#888" text-anchor="middle">U∩W={0},分解 v=u+w 唯一</text>

  <!-- ===== 右:非直和,U+W+X,分解不唯一 ===== -->
  <text x="410" y="28" font-size="14" font-weight="bold" fill="#e77" text-anchor="middle">U+W+X:同一个 v,多种拆法</text>
  <!-- 原点 (410,185) -->
  <line x1="300" y1="185" x2="530" y2="185" stroke="#2b7" stroke-width="2"/>
  <text x="512" y="178" font-size="13" fill="#2b7" font-weight="bold">U</text>
  <line x1="410" y1="290" x2="410" y2="70" stroke="#46c" stroke-width="2"/>
  <text x="418" y="80" font-size="13" fill="#46c" font-weight="bold">W</text>
  <!-- 第三条线 X: 斜 45° -->
  <line x1="335" y1="260" x2="505" y2="90" stroke="#e77" stroke-width="2"/>
  <text x="500" y="86" font-size="13" fill="#e77" font-weight="bold">X</text>
  <!-- 目标点 v=(2,1.6) -> (510,105) -->
  <circle cx="510" cy="105" r="4.5" fill="#444"/>
  <text x="516" y="101" font-size="13" fill="#444" font-weight="bold">v</text>
  <circle cx="410" cy="185" r="4" fill="#444"/>
  <!-- 拆法一:U + W -->
  <line x1="410" y1="185" x2="504" y2="185" stroke="#2b7" stroke-width="2" marker-end="url(#ar-g2)" opacity="0.9"/>
  <line x1="510" y1="185" x2="510" y2="112" stroke="#46c" stroke-width="2" marker-end="url(#ar-b2)" opacity="0.9"/>
  <!-- 拆法二:X + (U沿水平回补) -->
  <line x1="410" y1="185" x2="476" y2="119" stroke="#e77" stroke-width="2" marker-end="url(#ar-r2)" opacity="0.9"/>
  <line x1="480" y1="115" x2="504" y2="108" stroke="#2b7" stroke-width="2" marker-end="url(#ar-g2)" opacity="0.6" stroke-dasharray="3 2"/>
  <text x="410" y="318" font-size="11" fill="#888" text-anchor="middle">线两两交于 0,但三条线"过剩",拆法不唯一</text>
</svg>
