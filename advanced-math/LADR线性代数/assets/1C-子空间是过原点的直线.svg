<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" font-family="sans-serif">
  <defs>
    <marker id="ar-g" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2b7"/>
    </marker>
    <marker id="ar-d" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#444"/>
    </marker>
  </defs>

  <!-- ===== 左面板:过原点的直线 = 子空间 ===== -->
  <text x="150" y="34" font-size="14" font-weight="bold" fill="#2b7" text-anchor="middle">过原点的直线:是子空间</text>
  <!-- 坐标轴 -->
  <line x1="46" y1="165" x2="258" y2="165" stroke="#444" stroke-width="1.3" marker-end="url(#ar-d)"/>
  <line x1="150" y1="300" x2="150" y2="58" stroke="#444" stroke-width="1.3" marker-end="url(#ar-d)"/>
  <!-- 直线 U (过原点) -->
  <line x1="46" y1="222" x2="254" y2="108" stroke="#2b7" stroke-width="2.5"/>
  <text x="246" y="100" font-size="14" fill="#2b7" font-weight="bold">U</text>
  <!-- 原点 0 ∈ U -->
  <circle cx="150" cy="165" r="4.5" fill="#2b7"/>
  <text x="156" y="182" font-size="13" fill="#2b7">0 ∈ U</text>
  <!-- 一个向量 a 与它的 2 倍,都还在线上 -->
  <circle cx="189" cy="143.55" r="3.5" fill="#444"/>
  <text x="193" y="140" font-size="12" fill="#444">a</text>
  <circle cx="228" cy="122.1" r="3.5" fill="#444"/>
  <text x="232" y="118" font-size="12" fill="#444">2a</text>
  <text x="150" y="318" font-size="11" fill="#888" text-anchor="middle">含 0、加法与数乘都跑不出这条线</text>

  <!-- ===== 右面板:不过原点的直线 = 不是子空间 ===== -->
  <text x="405" y="34" font-size="14" font-weight="bold" fill="#e77" text-anchor="middle">不过原点的直线:不是子空间</text>
  <!-- 坐标轴 -->
  <line x1="300" y1="165" x2="520" y2="165" stroke="#444" stroke-width="1.3" marker-end="url(#ar-d)"/>
  <line x1="400" y1="300" x2="400" y2="58" stroke="#444" stroke-width="1.3" marker-end="url(#ar-d)"/>
  <!-- 直线 (不过原点) -->
  <line x1="317" y1="164" x2="475" y2="77" stroke="#e77" stroke-width="2.5"/>
  <text x="468" y="70" font-size="14" fill="#e77" font-weight="bold">L</text>
  <!-- 原点处空心圈:0 不在线上 -->
  <circle cx="400" cy="165" r="4.5" fill="#fff" stroke="#e77" stroke-width="2"/>
  <text x="356" y="184" font-size="13" fill="#e77">0 ∉ L</text>
  <text x="405" y="318" font-size="11" fill="#888" text-anchor="middle">连加法恒元都没有,第一关就过不了</text>
</svg>
