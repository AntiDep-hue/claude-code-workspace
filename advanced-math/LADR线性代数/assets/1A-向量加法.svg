<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 360" font-family="sans-serif">
  <defs>
    <marker id="a1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2b7"/></marker>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#e77"/></marker>
    <marker id="a3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#46c"/></marker>
  </defs>
  <g stroke="#eee" stroke-width="1">
    <line x1="40" y1="80" x2="400" y2="80"/><line x1="40" y1="140" x2="400" y2="140"/>
    <line x1="40" y1="260" x2="400" y2="260"/>
    <line x1="100" y1="40" x2="100" y2="320"/><line x1="160" y1="40" x2="160" y2="320"/>
    <line x1="280" y1="40" x2="280" y2="320"/><line x1="340" y1="40" x2="340" y2="320"/>
  </g>
  <!-- axes, origin (40,320), unit 60 -->
  <line x1="40" y1="320" x2="410" y2="320" stroke="#444" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="40" y1="320" x2="40" y2="40" stroke="#444" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="30" y="335" font-size="12" fill="#888">0</text>
  <!-- x=(2,1)=(160,260); y=(1,2)=(100,200) shifted from x tip; sum=(3,3)=(220,140) -->
  <!-- x from origin -->
  <line x1="40" y1="320" x2="160" y2="260" stroke="#2b7" stroke-width="2.5" marker-end="url(#a1)"/>
  <text x="95" y="305" font-size="13" fill="#2b7" font-weight="bold">x=(2,1)</text>
  <!-- y from tip of x: add (1,2)->(+60,-120) -> (220,140) -->
  <line x1="160" y1="260" x2="220" y2="140" stroke="#e77" stroke-width="2.5" marker-end="url(#a2)"/>
  <text x="225" y="200" font-size="13" fill="#e77" font-weight="bold">y=(1,2)</text>
  <!-- sum -->
  <line x1="40" y1="320" x2="220" y2="140" stroke="#46c" stroke-width="2.5" marker-end="url(#a3)"/>
  <text x="120" y="180" font-size="13" fill="#46c" font-weight="bold">x+y=(3,3)</text>
</svg>
