<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" font-family="sans-serif">
  <defs>
    <marker id="v" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2b7"/></marker>
    <marker id="w" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#e77"/></marker>
    <marker id="z" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#c5a"/></marker>
    <marker id="s" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#46c"/></marker>
  </defs>
  <!-- left panel: (u+v)+w -->
  <text x="20" y="28" font-size="14" fill="#333" font-weight="bold">(u + v) + w</text>
  <line x1="40" y1="280" x2="100" y2="220" stroke="#2b7" stroke-width="2.5" marker-end="url(#v)"/>
  <text x="55" y="265" font-size="12" fill="#2b7">u</text>
  <line x1="100" y1="220" x2="190" y2="190" stroke="#e77" stroke-width="2.5" marker-end="url(#w)"/>
  <text x="140" y="195" font-size="12" fill="#e77">v</text>
  <line x1="190" y1="190" x2="230" y2="100" stroke="#c5a" stroke-width="2.5" marker-end="url(#z)"/>
  <text x="205" y="150" font-size="12" fill="#c5a">w</text>
  <line x1="40" y1="280" x2="230" y2="100" stroke="#46c" stroke-width="2.5" stroke-dasharray="5 3" marker-end="url(#s)"/>
  <text x="95" y="175" font-size="12" fill="#46c">和</text>
  <!-- right panel: u+(v+w) -->
  <text x="320" y="28" font-size="14" fill="#333" font-weight="bold">u + (v + w)</text>
  <line x1="340" y1="280" x2="400" y2="220" stroke="#2b7" stroke-width="2.5" marker-end="url(#v)"/>
  <text x="355" y="265" font-size="12" fill="#2b7">u</text>
  <line x1="400" y1="220" x2="490" y2="190" stroke="#e77" stroke-width="2.5" marker-end="url(#w)"/>
  <text x="440" y="195" font-size="12" fill="#e77">v</text>
  <line x1="490" y1="190" x2="530" y2="100" stroke="#c5a" stroke-width="2.5" marker-end="url(#z)"/>
  <text x="505" y="150" font-size="12" fill="#c5a">w</text>
  <line x1="340" y1="280" x2="530" y2="100" stroke="#46c" stroke-width="2.5" stroke-dasharray="5 3" marker-end="url(#s)"/>
  <text x="395" y="175" font-size="12" fill="#46c">和</text>
  <text x="120" y="310" font-size="12" fill="#888">两种加括号方式,箭头接力的终点是同一个</text>
</svg>
