<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 300" font-family="sans-serif">
  <defs>
    <marker id="o1g" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2b7"/></marker>
    <marker id="o1r" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#e77"/></marker>
    <marker id="o1b" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#46c"/></marker>
    <marker id="o1p" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#c5a"/></marker>
  </defs>
  <rect x="10" y="10" width="420" height="46" rx="6" fill="#f5f7fa" stroke="#ccd5e0"/>
  <text x="20" y="31" font-size="13" fill="#333" font-weight="bold">本图演算：b = λa + c，要求 c·a = 0</text>
  <text x="20" y="48" font-size="12.5" fill="#333">⟹ λ = (b·a)/(a·a) = −10/5 = −2，c = b − λa</text>
  <circle cx="300" cy="215" r="3" fill="#444"/>
  <text x="305" y="231" font-size="12" fill="#888">O</text>
  <!-- a 绿 向右 -->
  <line x1="300" y1="215" x2="394" y2="215" stroke="#2b7" stroke-width="2.5" marker-end="url(#o1g)"/>
  <text x="350" y="233" font-size="13" fill="#2b7" font-weight="bold">a</text>
  <!-- λa 蓝虚线 向左(λ<0 反向) -->
  <line x1="300" y1="215" x2="210" y2="215" stroke="#46c" stroke-width="2.5" stroke-dasharray="5 3" marker-end="url(#o1b)"/>
  <text x="218" y="205" font-size="13" fill="#46c" font-weight="bold">λa = −2a</text>
  <!-- c 红 垂直向上 -->
  <line x1="210" y1="215" x2="210" y2="95" stroke="#e77" stroke-width="2.5" marker-end="url(#o1r)"/>
  <text x="140" y="155" font-size="13" fill="#e77" font-weight="bold">c (⊥ a)</text>
  <!-- b 紫 -->
  <line x1="300" y1="215" x2="210" y2="95" stroke="#c5a" stroke-width="2.5" marker-end="url(#o1p)"/>
  <text x="225" y="83" font-size="13" fill="#c5a" font-weight="bold">b = λa + c</text>
  <!-- 直角标记 -->
  <path d="M210,201 L224,201 L224,215" fill="none" stroke="#999" stroke-width="1"/>
</svg>
